name: Code Review

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  complexity-check:
    name: Complexity Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for functions over 50 lines
        run: |
          echo "## Function Length Report" >> $GITHUB_STEP_SUMMARY
          FAILED=0

          for file in $(find . -name "*.js" -not -path "./node_modules/*"); do
            # Use awk to detect functions longer than 50 lines
            LONG_FUNCTIONS=$(awk '
              /function[ ]*[a-zA-Z_]*[ ]*\(/ || /=>[ ]*\{/ || /[a-zA-Z_]+[ ]*:[ ]*function/ {
                start = NR
                depth = 0
                for (i = 1; i <= length($0); i++) {
                  c = substr($0, i, 1)
                  if (c == "{") depth++
                  if (c == "}") depth--
                }
                if (depth > 0) {
                  func_start = NR
                  func_line = $0
                  next
                }
              }
              func_start > 0 {
                for (i = 1; i <= length($0); i++) {
                  c = substr($0, i, 1)
                  if (c == "{") depth++
                  if (c == "}") {
                    depth--
                    if (depth == 0) {
                      len = NR - func_start + 1
                      if (len > 50) {
                        gsub(/^[ \t]+/, "", func_line)
                        print FILENAME ":" func_start ": " len " lines - " func_line
                      }
                      func_start = 0
                      next
                    }
                  }
                }
              }
            ' "$file")

            if [ -n "$LONG_FUNCTIONS" ]; then
              echo "$LONG_FUNCTIONS"
              echo "$LONG_FUNCTIONS" >> $GITHUB_STEP_SUMMARY
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "::error::One or more functions exceed 50 lines"
            exit 1
          else
            echo "All functions are within the 50-line limit." >> $GITHUB_STEP_SUMMARY
          fi

  duplication-check:
    name: Duplication Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run jscpd duplication detection
        run: |
          npx jscpd . \
            --threshold 5 \
            --reporters consoleFull \
            --format "javascript,html" \
            --ignore "node_modules,.git,vendor"
