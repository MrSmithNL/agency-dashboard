<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smith AI Agency — Cockpit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0f172a',
            card: '#1e293b',
            border: '#334155',
            accent: '#3b82f6',
            green: { 500: '#22c55e', 900: '#14532d' },
            amber: { 500: '#f59e0b', 900: '#78350f' },
            red: { 500: '#ef4444', 900: '#7f1d1d' },
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0f172a; font-family: 'Inter', system-ui, sans-serif; }
    .progress-bar { transition: width 0.8s ease-out; }
    .rag-green { color: #22c55e; }
    .rag-amber { color: #f59e0b; }
    .rag-red { color: #ef4444; }
    .status-chip { font-size: 0.7rem; padding: 2px 8px; border-radius: 9999px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .chip-thisweek { background: #1e3a5f; color: #60a5fa; }
    .chip-inprogress { background: #1a3a2a; color: #4ade80; }
    .chip-blocked { background: #3b1818; color: #f87171; }
    .chip-backlog { background: #27272a; color: #a1a1aa; }
    .chip-done { background: #14532d; color: #86efac; }
    .trend-up::after { content: ' \2191'; color: #22c55e; }
    .trend-down::after { content: ' \2193'; color: #ef4444; }
    .trend-flat::after { content: ' \2192'; color: #94a3b8; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeIn 0.4s ease-out forwards; }
  </style>
</head>
<body class="text-slate-200 min-h-screen">
  <script src="data.js"></script>

  <!-- Header -->
  <header class="border-b border-border px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-accent flex items-center justify-center font-bold text-white text-sm">S</div>
      <div>
        <h1 class="text-lg font-semibold text-white">Smith AI Agency</h1>
        <p class="text-xs text-slate-400">Performance Cockpit</p>
      </div>
    </div>
    <div class="text-right">
      <p class="text-xs text-slate-400">Last sync</p>
      <p class="text-sm text-slate-300" id="lastSync"></p>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 space-y-6">

    <!-- KPI Cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="kpiCards"></div>

    <!-- Project Overview -->
    <section>
      <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Project Performance</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="projectCards"></div>
    </section>

    <!-- Charts Row -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <!-- Tasks by Status -->
      <div class="bg-card rounded-xl border border-border p-5">
        <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">Tasks by Status</h3>
        <canvas id="taskStatusChart" height="200"></canvas>
      </div>
      <!-- Costs by Project -->
      <div class="bg-card rounded-xl border border-border p-5">
        <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">Monthly Costs (EUR)</h3>
        <canvas id="costChart" height="200"></canvas>
      </div>
    </div>

    <!-- Active Tasks Table -->
    <section>
      <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Active Tasks</h2>
      <div class="bg-card rounded-xl border border-border overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-border text-left text-slate-400 text-xs uppercase tracking-wider">
                <th class="px-4 py-3">Task</th>
                <th class="px-4 py-3">Project</th>
                <th class="px-4 py-3">Status</th>
                <th class="px-4 py-3">Priority</th>
                <th class="px-4 py-3">Last Activity</th>
              </tr>
            </thead>
            <tbody id="taskTable"></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- Financial Breakdown -->
    <section>
      <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Cost Breakdown</h2>
      <div class="bg-card rounded-xl border border-border overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-border text-left text-slate-400 text-xs uppercase tracking-wider">
                <th class="px-4 py-3">Service</th>
                <th class="px-4 py-3">Project</th>
                <th class="px-4 py-3">Category</th>
                <th class="px-4 py-3 text-right">Amount</th>
              </tr>
            </thead>
            <tbody id="financialTable"></tbody>
          </table>
        </div>
      </div>
    </section>

  </main>

  <footer class="border-t border-border px-6 py-4 text-center text-xs text-slate-500">
    <a href="https://docs.google.com/spreadsheets/d/1iZUsOKh1hAR0qtnu5HGk9WxTEXMuaZcvKY5pF0TVEJI/edit" target="_blank" class="hover:text-slate-300">View Google Sheet</a>
    &middot; Auto-generated by Claude Code
  </footer>

  <script>
    const D = DASHBOARD_DATA;

    // --- Last Sync ---
    const syncDate = new Date(D.lastSync);
    document.getElementById('lastSync').textContent = syncDate.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });

    // --- KPI Cards ---
    const activeTasks = D.tasks.filter(t => ['This Week', 'In Progress'].includes(t.status));
    const blockedTasks = D.tasks.filter(t => t.status === 'Blocked');
    const doneTasks = D.tasks.filter(t => t.status === 'Done');
    const totalBurn = D.financial.reduce((sum, f) => sum + Math.abs(f.amount), 0);

    const kpis = [
      { label: 'Active Projects', value: D.overview.length, color: 'text-blue-400' },
      { label: 'This Week', value: activeTasks.length, color: 'text-blue-400' },
      { label: 'Blocked', value: blockedTasks.length, color: blockedTasks.length > 0 ? 'text-red-400' : 'text-green-400' },
      { label: 'Monthly Burn', value: '\u20AC' + totalBurn.toFixed(0), color: 'text-amber-400' },
    ];

    const kpiContainer = document.getElementById('kpiCards');
    kpis.forEach((kpi, i) => {
      const div = document.createElement('div');
      div.className = 'bg-card rounded-xl border border-border p-4 animate-in';
      div.style.animationDelay = `${i * 0.1}s`;
      div.innerHTML = `
        <p class="text-xs text-slate-400 uppercase tracking-wider">${kpi.label}</p>
        <p class="text-2xl font-bold ${kpi.color} mt-1">${kpi.value}</p>
      `;
      kpiContainer.appendChild(div);
    });

    // --- Project Cards ---
    const projectContainer = document.getElementById('projectCards');
    D.overview.forEach((p, i) => {
      const pct = p.omtmTarget > 0 ? Math.min(100, (p.omtmValue / p.omtmTarget) * 100) : 0;
      const ragClass = p.rag === 'Green' ? 'rag-green' : p.rag === 'Amber' ? 'rag-amber' : 'rag-red';
      const trendClass = p.trend === 'up' ? 'trend-up' : p.trend === 'down' ? 'trend-down' : 'trend-flat';
      const barColor = pct >= 80 ? 'bg-green-500' : pct >= 50 ? 'bg-amber-500' : 'bg-red-500';
      const shortName = p.project.replace(/^(CLIENT-\d+|PROD-\d+|INFRA-\d+)\s+/, '');

      const div = document.createElement('div');
      div.className = 'bg-card rounded-xl border border-border p-4 animate-in';
      div.style.animationDelay = `${i * 0.08}s`;
      div.innerHTML = `
        <div class="flex items-center justify-between mb-2">
          <h3 class="font-semibold text-white text-sm">${shortName}</h3>
          <span class="${ragClass} text-lg font-bold">\u25CF</span>
        </div>
        <p class="text-xs text-slate-400 mb-1">${p.omtmName}</p>
        <div class="flex items-baseline gap-1 mb-2">
          <span class="text-xl font-bold text-white ${trendClass}">${p.omtmValue}</span>
          <span class="text-xs text-slate-500">/ ${p.omtmTarget}</span>
        </div>
        <div class="w-full bg-slate-700 rounded-full h-1.5">
          <div class="${barColor} h-1.5 rounded-full progress-bar" style="width: ${pct}%"></div>
        </div>
        <p class="text-xs text-slate-500 mt-2">${p.focus}</p>
      `;
      projectContainer.appendChild(div);
    });

    // --- Tasks by Status Chart ---
    const statusCounts = {};
    D.tasks.forEach(t => { statusCounts[t.status] = (statusCounts[t.status] || 0) + 1; });
    const statusOrder = ['This Week', 'In Progress', 'Blocked', 'Review', 'Backlog', 'Done'];
    const statusColors = { 'This Week': '#3b82f6', 'In Progress': '#22c55e', 'Blocked': '#ef4444', 'Review': '#a855f7', 'Backlog': '#64748b', 'Done': '#14532d' };

    new Chart(document.getElementById('taskStatusChart'), {
      type: 'bar',
      data: {
        labels: statusOrder.filter(s => statusCounts[s]),
        datasets: [{
          data: statusOrder.filter(s => statusCounts[s]).map(s => statusCounts[s]),
          backgroundColor: statusOrder.filter(s => statusCounts[s]).map(s => statusColors[s]),
          borderRadius: 6,
          barThickness: 32,
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 11 } } },
          y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', stepSize: 5 }, beginAtZero: true }
        }
      }
    });

    // --- Costs by Project Chart ---
    const costByProject = {};
    D.financial.forEach(f => {
      if (f.amount < 0) {
        const key = f.project.replace(/^(CLIENT-\d+|PROD-\d+)\s+/, '');
        costByProject[key] = (costByProject[key] || 0) + Math.abs(f.amount);
      }
    });
    const costLabels = Object.keys(costByProject).sort((a, b) => costByProject[b] - costByProject[a]);
    const costColors = ['#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b', '#22c55e', '#06b6d4'];

    new Chart(document.getElementById('costChart'), {
      type: 'doughnut',
      data: {
        labels: costLabels,
        datasets: [{
          data: costLabels.map(l => costByProject[l]),
          backgroundColor: costColors.slice(0, costLabels.length),
          borderWidth: 0,
        }]
      },
      options: {
        responsive: true,
        cutout: '65%',
        plugins: {
          legend: { position: 'right', labels: { color: '#94a3b8', padding: 12, font: { size: 11 } } }
        }
      }
    });

    // --- Active Tasks Table ---
    const tableBody = document.getElementById('taskTable');
    const activeSorted = D.tasks
      .filter(t => !['Done'].includes(t.status))
      .sort((a, b) => {
        const order = { 'This Week': 0, 'In Progress': 1, 'Blocked': 2, 'Review': 3, 'Backlog': 4 };
        return (order[a.status] ?? 5) - (order[b.status] ?? 5);
      });

    activeSorted.forEach(t => {
      const chipClass = t.status === 'This Week' ? 'chip-thisweek' :
                        t.status === 'In Progress' ? 'chip-inprogress' :
                        t.status === 'Blocked' ? 'chip-blocked' : 'chip-backlog';
      const tr = document.createElement('tr');
      tr.className = 'border-b border-border/50 hover:bg-slate-800/50';
      tr.innerHTML = `
        <td class="px-4 py-2.5"><a href="${t.url}" target="_blank" class="hover:text-blue-400">${t.name}</a></td>
        <td class="px-4 py-2.5 text-slate-400">${t.project}</td>
        <td class="px-4 py-2.5"><span class="status-chip ${chipClass}">${t.status}</span></td>
        <td class="px-4 py-2.5 text-slate-400">${t.priority}</td>
        <td class="px-4 py-2.5 text-slate-400">${t.lastActivity}</td>
      `;
      tableBody.appendChild(tr);
    });

    // --- Financial Table ---
    const finBody = document.getElementById('financialTable');
    D.financial.filter(f => f.amount < 0).sort((a, b) => a.amount - b.amount).forEach(f => {
      const tr = document.createElement('tr');
      tr.className = 'border-b border-border/50 hover:bg-slate-800/50';
      tr.innerHTML = `
        <td class="px-4 py-2.5">${f.description}</td>
        <td class="px-4 py-2.5 text-slate-400">${f.project.replace(/^(CLIENT-\d+|PROD-\d+)\s+/, '')}</td>
        <td class="px-4 py-2.5 text-slate-400">${f.category}</td>
        <td class="px-4 py-2.5 text-right font-mono text-red-400">\u20AC${Math.abs(f.amount).toFixed(2)}</td>
      `;
      finBody.appendChild(tr);
    });

    const totalRow = document.createElement('tr');
    totalRow.className = 'bg-slate-800/50 font-semibold';
    totalRow.innerHTML = `
      <td class="px-4 py-2.5" colspan="3">Total Monthly Burn</td>
      <td class="px-4 py-2.5 text-right font-mono text-amber-400">\u20AC${totalBurn.toFixed(2)}</td>
    `;
    finBody.appendChild(totalRow);
  </script>
</body>
</html>
