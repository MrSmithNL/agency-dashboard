<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smith AI Agency — Cockpit</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%233b82f6'/><text x='16' y='23' text-anchor='middle' fill='white' font-family='system-ui' font-weight='bold' font-size='20'>S</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0f172a',
            card: '#1e293b',
            border: '#334155',
            accent: '#3b82f6',
            green: { 500: '#22c55e', 900: '#14532d' },
            amber: { 500: '#f59e0b', 900: '#78350f' },
            red: { 500: '#ef4444', 900: '#7f1d1d' },
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0f172a; font-family: 'Inter', system-ui, sans-serif; }
    .progress-bar { transition: width 0.8s ease-out; }
    .rag-green { color: #22c55e; } .rag-amber { color: #f59e0b; } .rag-red { color: #ef4444; }
    .status-chip { font-size: 0.7rem; padding: 2px 8px; border-radius: 9999px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .chip-thisweek { background: #1e3a5f; color: #60a5fa; } .chip-inprogress { background: #1a3a2a; color: #4ade80; }
    .chip-blocked { background: #3b1818; color: #f87171; } .chip-backlog { background: #27272a; color: #a1a1aa; }
    .chip-done { background: #14532d; color: #86efac; } .chip-review { background: #2e1065; color: #c084fc; }
    .trend-up::after { content: ' \2191'; color: #22c55e; } .trend-down::after { content: ' \2193'; color: #ef4444; } .trend-flat::after { content: ' \2192'; color: #94a3b8; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeIn 0.4s ease-out forwards; }
    .clickable-card { cursor: pointer; transition: transform 0.15s, border-color 0.15s; } .clickable-card:hover { transform: translateY(-2px); border-color: #3b82f6; }
    .back-btn { cursor: pointer; transition: color 0.15s; } .back-btn:hover { color: #60a5fa; }
    .type-client { border-left: 3px solid #22c55e; } .type-product { border-left: 3px solid #3b82f6; } .type-infrastructure { border-left: 3px solid #a855f7; }
    .warning-chip { background: #78350f; color: #fbbf24; font-size: 0.65rem; padding: 1px 6px; border-radius: 9999px; }
    /* Tab nav */
    .tab-btn { cursor: pointer; } .tab-btn.active { color: #fff !important; border-bottom-color: #3b82f6 !important; }
    /* Calendar */
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cal-day { min-height: 72px; cursor: pointer; transition: background 0.15s; } .cal-day:hover { background: #334155; }
    .cal-day.today { border: 1px solid #3b82f6; } .cal-day.selected { background: #1e3a5f; }
    .cal-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    .dot-recipe { background: #3b82f6; } .dot-standing-order { background: #a855f7; } .dot-deadline { background: #f59e0b; }
    /* Improvement */
    .expandable-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; } .expandable-content.open { max-height: 1500px; }
    .detail-section { border-left: 2px solid #334155; padding-left: 12px; margin-bottom: 12px; }
    .source-tag { font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; background: #1e293b; border: 1px solid #334155; }
    .score-bar { height: 4px; border-radius: 2px; background: #334155; } .score-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease-out; }
    /* Agents */
    .gauge-bg { fill: none; stroke: #334155; stroke-width: 6; } .gauge-fill { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.8s ease-out; }
    .tier-badge { font-size: 0.6rem; padding: 1px 5px; border-radius: 4px; font-weight: 700; }
    .tier-1 { background: #14532d; color: #86efac; } .tier-2 { background: #1e3a5f; color: #60a5fa; } .tier-3 { background: #27272a; color: #a1a1aa; }
    .sub-agent { border-left: 2px solid #334155; margin-left: 16px; padding-left: 12px; }
    select.filter-select { background: #0f172a; border: 1px solid #334155; border-radius: 6px; padding: 4px 8px; font-size: 0.75rem; color: #e2e8f0; }
    /* Architecture diagrams */
    .arch-node { cursor: pointer; transition: opacity 0.15s, filter 0.15s; } .arch-node:hover { opacity: 0.9; filter: brightness(1.2); }
    .arch-toggle { cursor: pointer; user-select: none; } .arch-toggle:hover { background: #334155; }
    .arch-chevron { transition: transform 0.3s ease; display: inline-block; } .arch-chevron.open { transform: rotate(90deg); }
    .arch-detail { background: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 16px; margin-top: 12px; animation: fadeIn 0.3s ease-out; }
    .arch-detail-row { display: flex; gap: 8px; margin-bottom: 8px; } .arch-detail-label { color: #64748b; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; min-width: 80px; flex-shrink: 0; } .arch-detail-value { color: #cbd5e1; font-size: 0.8rem; }
  </style>
</head>
<body class="text-slate-200 min-h-screen">
  <script src="data.js"></script>

  <header class="border-b border-border px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-accent flex items-center justify-center font-bold text-white text-sm clickable-card" onclick="navigateTo('')">S</div>
      <div>
        <h1 class="text-lg font-semibold text-white"><a href="#" onclick="navigateTo(''); return false;" class="hover:text-blue-400">Smith AI Agency</a></h1>
        <p class="text-xs text-slate-400" id="breadcrumb">Performance Cockpit</p>
      </div>
    </div>
    <div class="text-right">
      <p class="text-xs text-slate-400">Last sync</p>
      <p class="text-sm text-slate-300" id="lastSync"></p>
    </div>
  </header>

  <!-- Tab Navigation -->
  <nav class="border-b border-border bg-card/50" id="tabNav">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 flex gap-1 overflow-x-auto">
      <button onclick="navigateTo('')" data-tab="home" class="tab-btn px-4 py-3 text-sm font-medium text-slate-400 hover:text-white border-b-2 border-transparent transition-colors whitespace-nowrap">Cockpit</button>
      <button onclick="navigateTo('calendar')" data-tab="calendar" class="tab-btn px-4 py-3 text-sm font-medium text-slate-400 hover:text-white border-b-2 border-transparent transition-colors whitespace-nowrap">Calendar</button>
      <button onclick="navigateTo('improvement')" data-tab="improvement" class="tab-btn px-4 py-3 text-sm font-medium text-slate-400 hover:text-white border-b-2 border-transparent transition-colors whitespace-nowrap">Improvement</button>
      <button onclick="navigateTo('agents')" data-tab="agents" class="tab-btn px-4 py-3 text-sm font-medium text-slate-400 hover:text-white border-b-2 border-transparent transition-colors whitespace-nowrap">Agents</button>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 space-y-6" id="mainContent"></main>

  <footer class="border-t border-border px-6 py-4 text-center text-xs text-slate-500">
    <a href="https://docs.google.com/spreadsheets/d/1iZUsOKh1hAR0qtnu5HGk9WxTEXMuaZcvKY5pF0TVEJI/edit" target="_blank" class="hover:text-slate-300">View Google Sheet</a>
    &middot; Auto-generated by Claude Code
  </footer>

  <script>
    const D = DASHBOARD_DATA;
    const chartInstances = [];

    // ==================== UTILITIES ====================
    function destroyCharts() { chartInstances.forEach(c => c.destroy()); chartInstances.length = 0; }
    function chipClass(s) { return { 'This Week':'chip-thisweek','In Progress':'chip-inprogress','Blocked':'chip-blocked','Review':'chip-review','Done':'chip-done' }[s] || 'chip-backlog'; }
    function ragClass(r) { return r === 'Green' ? 'rag-green' : r === 'Amber' ? 'rag-amber' : 'rag-red'; }
    function trendClass(t) { return t === 'up' ? 'trend-up' : t === 'down' ? 'trend-down' : 'trend-flat'; }
    function typeClass(t) { return t === 'Client' ? 'type-client' : t === 'Product' ? 'type-product' : 'type-infrastructure'; }
    function barColor(p) { return p === null ? 'bg-slate-600' : p >= 80 ? 'bg-green-500' : p >= 50 ? 'bg-amber-500' : 'bg-red-500'; }
    function barHex(p) { return p >= 80 ? '#22c55e' : p >= 50 ? '#f59e0b' : '#ef4444'; }
    function formatMetricValue(m) {
      if (m.format === 'currency') return '\u20AC' + (typeof m.value === 'number' ? m.value.toFixed(2) : m.value);
      if (m.format === 'score') return m.value + '/100'; if (m.format === 'boolean') return m.label || (m.value ? 'Yes' : 'No');
      if (m.format === 'seconds') return m.value > 0 ? (m.value / 60).toFixed(1) + ' min' : '0';
      if (m.format === 'position') return '#' + m.value; if (m.format === 'ratio') return m.value + '/' + m.target;
      return String(m.value);
    }
    function metricPct(m) { if (!m.target || m.target === 0) return null; if (m.lowerIsBetter) return Math.min(100, (m.target / m.value) * 100); if (m.format === 'boolean') return m.value ? 100 : 0; return Math.min(100, (m.value / m.target) * 100); }
    function projectLabelForTask(tp) { return { 'LOE':'CLIENT-001','Hairgenetix':'CLIENT-002','SEO':'PROD-001','SF':'PROD-002','INFRA':'INFRA' }[tp] || tp; }
    function tasksForProject(pid) { const d = D.projectDetails[pid]; if (!d) return []; const c = d.code; return D.tasks.filter(t => { const l = projectLabelForTask(t.project); return l === c || (c.startsWith('INFRA') && l === 'INFRA' && t.name.toLowerCase().includes(c.toLowerCase().replace('infra-','infra-0'))); }); }
    function costsForProject(pid) { const d = D.projectDetails[pid]; if (!d) return []; return D.financial.filter(f => f.project.toLowerCase().includes(d.name.toLowerCase()) || f.project.toLowerCase().includes(d.code.toLowerCase())); }

    // ==================== ROUTING ====================
    function navigateTo(r) { window.location.hash = r ? '#/' + r : '#'; }
    function getRoute() { const h = window.location.hash; if (!h || h === '#' || h === '#/') return 'home'; return h.replace('#/', ''); }
    window.addEventListener('hashchange', render);

    const syncDate = new Date(D.lastSync);
    document.getElementById('lastSync').textContent = syncDate.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });

    // State
    let calState = { month: new Date().getMonth(), year: new Date().getFullYear(), selected: null };
    let impState = { level: 'all', project: 'all', category: 'all', priority: 'all', status: 'all', sort: 'total-desc' };
    let agentState = { dept: null, expandedAgent: null };

    function render() {
      destroyCharts();
      const route = getRoute();
      const main = document.getElementById('mainContent');
      main.innerHTML = '';
      // Tab highlighting
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      const tabMap = { home:'home', calendar:'calendar', improvement:'improvement', agents:'agents' };
      const ab = document.querySelector(`[data-tab="${tabMap[route] || 'home'}"]`);
      if (ab) ab.classList.add('active');
      const isProject = !!D.projectDetails[route];
      document.getElementById('tabNav').style.display = isProject ? 'none' : '';

      if (route === 'home') { renderHome(main); document.getElementById('breadcrumb').textContent = 'Performance Cockpit'; document.title = 'Smith AI Agency \u2014 Cockpit'; }
      else if (route === 'calendar') { renderCalendar(main); document.getElementById('breadcrumb').textContent = 'Calendar & Scheduler'; document.title = 'Smith AI Agency \u2014 Calendar'; }
      else if (route === 'improvement') { renderImpHierarchy(main); document.getElementById('breadcrumb').textContent = 'Continuous Improvement'; document.title = 'Smith AI Agency \u2014 Improvement'; }
      else if (route === 'agents') { renderAgents(main); document.getElementById('breadcrumb').textContent = 'Agent Registry'; document.title = 'Smith AI Agency \u2014 Agents'; }
      else if (isProject) { renderProjectDetail(main, route); const det = D.projectDetails[route]; document.getElementById('breadcrumb').innerHTML = '<span class="back-btn" onclick="navigateTo(\'\')">\u2190 Cockpit</span> / ' + det.code + ' ' + det.name; document.title = det.code + ' ' + det.name + ' \u2014 Cockpit'; }
      else { main.innerHTML = '<p class="text-slate-400">Page not found. <a href="#" class="text-blue-400 hover:underline" onclick="navigateTo(\'\'); return false;">Back to Cockpit</a></p>'; }
    }

    // ==================== HOME VIEW ====================
    function renderHome(c) {
      // KPIs
      const kg = el('div','grid grid-cols-2 md:grid-cols-4 gap-4');
      D.agencyKPIs.slice(0,4).forEach((k,i) => {
        const color = k.name.includes('Burn') ? 'text-amber-400' : k.name.includes('Revenue') ? 'text-green-400' : k.name.includes('Blocked') ? (k.value > 0 ? 'text-red-400' : 'text-green-400') : 'text-blue-400';
        kg.innerHTML += `<div class="bg-card rounded-xl border border-border p-4 animate-in" style="animation-delay:${i*0.1}s"><p class="text-xs text-slate-400 uppercase tracking-wider">${k.name}</p><p class="text-2xl font-bold ${color} mt-1 ${trendClass(k.trend)}">${formatMetricValue(k)}</p>${k.target !== null ? `<p class="text-xs text-slate-500 mt-1">Target: ${k.format==='currency'?'\u20AC'+k.target:k.target}</p>` : ''}</div>`;
      });
      c.appendChild(kg);
      // Secondary KPIs
      const sg = el('div','grid grid-cols-2 md:grid-cols-4 gap-4');
      D.agencyKPIs.slice(4).forEach((k,i) => { sg.innerHTML += `<div class="bg-card rounded-xl border border-border p-3 animate-in" style="animation-delay:${(i+4)*0.1}s"><p class="text-xs text-slate-400 uppercase tracking-wider">${k.name}</p><p class="text-lg font-bold text-slate-200 mt-1 ${trendClass(k.trend)}">${formatMetricValue(k)}</p></div>`; });
      c.appendChild(sg);
      // Projects
      c.appendChild(el('h2','text-sm font-semibold text-slate-400 uppercase tracking-wider','Project Performance \u2014 Click to drill down'));
      const pg = el('div','grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4');
      D.overview.forEach((p,i) => {
        const pct = p.omtmTarget > 0 ? Math.min(100,(p.omtmValue/p.omtmTarget)*100) : 0;
        const short = p.project.replace(/^(CLIENT-\d+|PROD-\d+|INFRA-\d+)\s+/,'');
        const det = D.projectDetails[p.id]; const tl = det ? det.type : ''; const mc = det?.missingMetrics?.length || 0;
        const d = el('div',`bg-card rounded-xl border border-border p-4 animate-in clickable-card ${det?typeClass(tl):''}`);
        d.style.animationDelay = `${i*0.08}s`; d.onclick = () => navigateTo(p.id);
        d.innerHTML = `<div class="flex items-center justify-between mb-2"><h3 class="font-semibold text-white text-sm">${short}</h3><div class="flex items-center gap-2">${mc>0?`<span class="warning-chip">${mc} gap${mc>1?'s':''}</span>`:''}<span class="${ragClass(p.rag)} text-lg font-bold">\u25CF</span></div></div><p class="text-xs text-slate-400 mb-1">${p.omtmName}</p><div class="flex items-baseline gap-1 mb-2"><span class="text-xl font-bold text-white ${trendClass(p.trend)}">${p.omtmValue}</span><span class="text-xs text-slate-500">/ ${p.omtmTarget}</span></div><div class="w-full bg-slate-700 rounded-full h-1.5"><div class="${barColor(pct)} h-1.5 rounded-full progress-bar" style="width:${pct}%"></div></div><p class="text-xs text-slate-500 mt-2">${p.focus}</p><p class="text-xs text-slate-600 mt-1">${tl} \u00B7 Click for details \u2192</p>`;
        pg.appendChild(d);
      });
      c.appendChild(pg);
      // Charts
      const cr = el('div','grid grid-cols-1 md:grid-cols-2 gap-4');
      cr.innerHTML = '<div class="bg-card rounded-xl border border-border p-5"><h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">Tasks by Status</h3><canvas id="taskStatusChart" height="200"></canvas></div><div class="bg-card rounded-xl border border-border p-5"><h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">Monthly Costs (EUR)</h3><canvas id="costChart" height="200"></canvas></div>';
      c.appendChild(cr);
      requestAnimationFrame(() => { renderTaskStatusChart(); renderCostChart(); });
      renderTasksTable(c, D.tasks.filter(t=>t.status!=='Done'), 'Active Tasks');
      renderFinancialTable(c, D.financial);
    }

    // ==================== ARCHITECTURE DIAGRAM ====================
    function renderArchDiagram(container, arch) {
      const typeColor = { app:'#3b82f6', hosting:'#22c55e', data:'#f59e0b', api:'#a855f7', tool:'#64748b', service:'#06b6d4', status:'#475569' };
      const typeLabel = { app:'Application', hosting:'Hosting', data:'Data', api:'API', tool:'Tool', service:'Service', status:'Status' };
      const nw = 130, nh = 52, gapX = 24, gapY = 80, padX = 40, padY = 10, labelH = 28;
      const nodeMap = {}; arch.nodes.forEach(n => nodeMap[n.id] = n);
      // Layers are now objects with { name, nodes }
      const layers = arch.layers.map(l => Array.isArray(l) ? { name: '', nodes: l } : l);
      // Calculate positions
      let maxRowW = 0;
      const positions = {};
      layers.forEach(layer => {
        const rowW = layer.nodes.length * nw + (layer.nodes.length - 1) * gapX;
        if (rowW > maxRowW) maxRowW = rowW;
      });
      const labelPadL = 100; // space for layer label on left
      layers.forEach((layer, ri) => {
        const rowW = layer.nodes.length * nw + (layer.nodes.length - 1) * gapX;
        const offsetX = (maxRowW - rowW) / 2;
        layer.nodes.forEach((nid, ci) => {
          positions[nid] = { x: labelPadL + padX + offsetX + ci * (nw + gapX), y: padY + ri * (nh + gapY + labelH) + labelH };
        });
      });
      const svgW = maxRowW + padX * 2 + labelPadL;
      const svgH = layers.length * (nh + labelH) + (layers.length - 1) * gapY + padY * 2;
      let svg = `<svg viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:${Math.max(svgW,500)}px;height:auto;">`;
      svg += '<defs><marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#475569"/></marker></defs>';
      // Layer backgrounds and labels
      layers.forEach((layer, ri) => {
        const y = padY + ri * (nh + gapY + labelH);
        const layerH = nh + labelH + 8;
        svg += `<rect x="4" y="${y}" width="${svgW - 8}" height="${layerH}" rx="8" fill="#1e293b" fill-opacity="0.4" stroke="#334155" stroke-width="0.5" stroke-dasharray="4,4"/>`;
        if (layer.name) svg += `<text x="16" y="${y + (layerH / 2) + 4}" fill="#64748b" font-size="10" font-weight="600" font-family="system-ui,sans-serif" text-anchor="start">${layer.name}</text>`;
      });
      // Connections
      arch.connections.forEach(cn => {
        const from = positions[cn.from], to = positions[cn.to];
        if (!from || !to) return;
        let fromRow = -1, toRow = -1;
        layers.forEach((l, i) => { if (l.nodes.includes(cn.from)) fromRow = i; if (l.nodes.includes(cn.to)) toRow = i; });
        if (fromRow === toRow) {
          const hx1 = from.x + nw, hy1 = from.y + nh / 2;
          const hx2 = to.x, hy2 = to.y + nh / 2;
          svg += `<line x1="${hx1}" y1="${hy1}" x2="${hx2}" y2="${hy2}" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>`;
        } else {
          const x1 = from.x + nw / 2, y1 = from.y + nh;
          const x2 = to.x + nw / 2, y2 = to.y;
          const my = (y1 + y2) / 2;
          svg += `<path d="M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>`;
        }
      });
      // Nodes
      arch.nodes.forEach(n => {
        const p = positions[n.id]; if (!p) return;
        const col = typeColor[n.type] || '#64748b';
        svg += `<g class="arch-node" data-node-id="${n.id}" onclick="showNodeDetail('${n.id}')" transform="translate(${p.x},${p.y})">`;
        svg += `<rect width="${nw}" height="${nh}" rx="8" fill="${col}18" stroke="${col}" stroke-width="1.5"/>`;
        svg += `<text x="${nw/2}" y="20" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600" font-family="system-ui,sans-serif">${n.label}</text>`;
        if (n.sub) svg += `<text x="${nw/2}" y="35" text-anchor="middle" fill="#94a3b8" font-size="8.5" font-family="system-ui,sans-serif">${n.sub}</text>`;
        // Type indicator dot
        svg += `<circle cx="${nw - 8}" cy="8" r="3" fill="${col}"/>`;
        svg += '</g>';
      });
      // Legend
      const legendY = svgH - 18;
      const types = [...new Set(arch.nodes.map(n => n.type))];
      let legendX = labelPadL + padX;
      svg += `<g transform="translate(0,${legendY})">`;
      types.forEach(t => {
        svg += `<circle cx="${legendX}" cy="0" r="4" fill="${typeColor[t]}"/>`;
        svg += `<text x="${legendX + 8}" y="4" fill="#64748b" font-size="8" font-family="system-ui,sans-serif">${typeLabel[t] || t}</text>`;
        legendX += (typeLabel[t] || t).length * 6 + 24;
      });
      svg += '</g>';
      svg += '</svg>';
      container.innerHTML = svg;
      // Store node data on container for detail panel
      container._archNodes = nodeMap;
    }
    // Node detail panel
    let _activeNodeDetail = null;
    window.showNodeDetail = function(nodeId) {
      const existing = document.getElementById('archDetailPanel');
      if (existing && _activeNodeDetail === nodeId) { existing.remove(); _activeNodeDetail = null; return; }
      if (existing) existing.remove();
      _activeNodeDetail = nodeId;
      // Find the node data by traversing all projectDetails
      const route = getRoute();
      const det = D.projectDetails[route];
      if (!det || !det.architecture) return;
      const node = det.architecture.nodes.find(n => n.id === nodeId);
      if (!node) return;
      const typeColor = { app:'#3b82f6', hosting:'#22c55e', data:'#f59e0b', api:'#a855f7', tool:'#64748b', service:'#06b6d4', status:'#475569' };
      const typeLabel = { app:'Application', hosting:'Hosting', data:'Data', api:'API', tool:'Tool', service:'Service', status:'Status' };
      const col = typeColor[node.type] || '#64748b';
      const d = node.details || {};
      const panel = document.createElement('div');
      panel.id = 'archDetailPanel';

    // ==================== CALENDAR TAB ====================
    function matchesCron(cron, date) {
      const [,, dom, mon, dow] = cron.split(' ');
      const d = new Date(date);
      if (dom !== '*' && parseInt(dom) !== d.getDate()) return false;
      if (mon !== '*' && parseInt(mon) !== d.getMonth() + 1) return false;
      if (dow !== '*') { const wd = d.getDay(); if (dow.includes('-')) { const [s,e] = dow.split('-').map(Number); if (wd < s || wd > e) return false; } else if (parseInt(dow) !== wd) return false; }
      return true;
    }
    function getSchedulesForDate(date) {
      return D.schedules.filter(s => s.cron === '* * * * *' ? false : matchesCron(s.cron, date));
    }

      c.appendChild(hdr);
      const calBox = el('div','bg-card rounded-xl border border-border p-4'); calBox.id = 'calBox'; c.appendChild(calBox);
      const dayPanel = el('div','hidden mt-4'); dayPanel.id = 'dayPanel'; c.appendChild(dayPanel);
      // Upcoming
      c.appendChild(el('h3','text-sm font-semibold text-slate-400 uppercase tracking-wider mt-6 mb-3','Upcoming (Next 7 Days)'));
      const upList = el('div','space-y-2'); upList.id = 'upList'; c.appendChild(upList);
      // Add schedule
      const ar = el('div','mt-4 flex items-center gap-4');
      ar.innerHTML = `<button onclick="toggleSchForm()" class="text-sm bg-accent hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition-colors">+ Add Schedule</button><span id="pendingBadge" class="text-xs text-slate-500"></span>`;
      c.appendChild(ar);
      const form = el('div','hidden mt-4 bg-card rounded-xl border border-border p-5'); form.id = 'schForm'; c.appendChild(form);
      drawCalGrid(); drawUpcoming(); updatePendingBadge();
    }
    function drawCalGrid() {
      const box = document.getElementById('calBox'); if (!box) return;
      const y = calState.year, m = calState.month;
      const title = document.getElementById('calTitle'); if (title) title.textContent = new Date(y, m).toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
      const first = new Date(y, m, 1); const startDay = (first.getDay() + 6) % 7; // Mon=0
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      const today = new Date(); const todayStr = today.toISOString().slice(0, 10);
      let html = '<div class="cal-grid mb-2">';
      ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => { html += `<div class="text-xs text-slate-500 text-center py-1 font-medium">${d}</div>`; });
      html += '</div><div class="cal-grid">';
      for (let i = 0; i < startDay; i++) html += '<div class="cal-day rounded-lg p-1"></div>';
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isToday = dateStr === todayStr;
        const isSel = calState.selected === dateStr;
        const scheds = getSchedulesForDate(dateStr);
        const dots = scheds.map(s => `<span class="cal-dot dot-${s.type}"></span>`).join('');
        html += `<div class="cal-day rounded-lg p-1 ${isToday?'today':''} ${isSel?'selected':''}" onclick="selectCalDay('${dateStr}')"><p class="text-xs ${isToday?'text-blue-400 font-bold':'text-slate-400'}">${d}</p><div class="flex flex-wrap gap-0.5 mt-1">${dots}</div></div>`;
      }
      html += '</div>';
      box.innerHTML = html;
    }
    window.selectCalDay = function(dateStr) {
      calState.selected = dateStr; drawCalGrid();
      const panel = document.getElementById('dayPanel');
      const scheds = getSchedulesForDate(dateStr);
      const d = new Date(dateStr);
      const dateLabel = d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      if (scheds.length === 0) { panel.className = 'mt-4 bg-card rounded-xl border border-border p-4'; panel.innerHTML = `<p class="text-sm text-slate-400">${dateLabel} \u2014 No schedules</p>`; return; }

    function updatePendingBadge() { const b = document.getElementById('pendingBadge'); if (!b) return; const p = JSON.parse(localStorage.getItem('pendingSchedules')||'[]'); b.textContent = p.length ? `${p.length} pending request${p.length>1?'s':''}` : ''; }

    // ==================== IMPROVEMENT TAB ====================
    function getRecStatuses() { return JSON.parse(localStorage.getItem('recStatuses')||'{}'); }
    function effectiveStatus(r) { return getRecStatuses()[r.id] || r.status; }

    window.toggleRec = function(id) { const el = document.getElementById('rd-'+id); if (el) el.classList.toggle('open'); };
    window.setRecSt = function(id, status) { const s = getRecStatuses(); if (status === 'proposed') delete s[id]; else s[id] = status; localStorage.setItem('recStatuses', JSON.stringify(s)); applyImpFilters(); };
    window.toggleResearchForm = function(id) { const f = document.getElementById('rf-'+id); if (f) { f.classList.toggle('hidden'); if (!f.classList.contains('hidden')) { const pending = JSON.parse(localStorage.getItem('pendingResearch')||'[]'); const existing = pending.find(p=>p.recId===id); if (existing) { const ta = document.getElementById('rn-'+id); if (ta) ta.value = existing.notes || ''; } } } };
    window.saveResearchReq = function(id) { const rec = D.recommendations.find(r=>r.id===id); const det = D.recommendationDetails[id]||{}; const notes = document.getElementById('rn-'+id)?.value||''; const pending = JSON.parse(localStorage.getItem('pendingResearch')||'[]'); const idx = pending.findIndex(p=>p.recId===id); const entry = { recId: id, title: rec.title, project: rec.project, category: rec.category, description: rec.description, rationale: det.rationale||'', sourceDetail: det.sourceDetail||'', relevance: det.relevance||'', notes: notes, createdAt: new Date().toISOString() }; if (idx>=0) pending[idx]=entry; else pending.push(entry); localStorage.setItem('pendingResearch',JSON.stringify(pending)); document.getElementById('rf-'+id).innerHTML='<p class="text-xs text-green-400 py-2">Research request saved. Claude will pick this up in the next session using all project context and previous research.</p>'; applyImpFilters(); };

    function renderRecCard(r, st, pendingRes) {

      const srcIcon = r.source === 'competitor' ? '\uD83D\uDD0D' : r.source === 'research' ? '\uD83D\uDCDA' : '\uD83D\uDCAC';
      const srcLabel = r.source === 'competitor' ? 'Competitor Analysis' : r.source === 'research' ? 'Best Practice Research' : 'Conversation';

      } else if (r.scoreType === 'competitor') {
        dims = [{l:'Strategic',v:r.scores.strategic,c:'#3b82f6'},{l:'Revenue',v:r.scores.revenue,c:'#22c55e'},{l:'Effort',v:r.scores.effort,c:'#f59e0b'},{l:'Urgency',v:r.scores.urgency,c:'#ef4444'}];
      } else {
        dims = [{l:'Efficiency',v:r.scores.efficiency,c:'#3b82f6'},{l:'Quality',v:r.scores.quality,c:'#22c55e'},{l:'Security',v:r.scores.security,c:'#ef4444'},{l:'Scalability',v:r.scores.scalability,c:'#a855f7'},{l:'Revenue',v:r.scores.revenue,c:'#f59e0b'}];
      }
      return `<div class="bg-card rounded-xl border border-border p-4 ${es==='archived'?'opacity-50':''}" style="border-left:3px solid ${lvlColor}" onclick="toggleRec('${r.id}')"><div class="flex items-center justify-between cursor-pointer"><div class="flex items-center gap-3 flex-1 min-w-0"><span class="text-xs font-mono text-slate-500 shrink-0">${r.sourceRef}</span><span class="font-medium text-white text-sm truncate">${r.title}</span><span class="text-xs text-slate-500 shrink-0 hidden sm:inline">${r.project}</span>${hasPending?'<span class="text-xs px-1.5 py-0.5 rounded bg-purple-900 text-purple-300 shrink-0">Research queued</span>':''}</div><div class="flex items-center gap-2 shrink-0"><span class="text-xs px-2 py-0.5 rounded-full ${pc[r.priority]}">${r.priority}</span><span class="text-sm font-bold ${r.priority==='Critical'?'text-red-400':r.priority==='High'?'text-amber-400':'text-blue-400'}">${r.total}/${r.maxTotal}</span></div></div>` +
      `<div id="rd-${r.id}" class="expandable-content mt-3">` +
      `<div class="flex flex-wrap items-center gap-2 mb-3"><span class="source-tag">${srcIcon} ${srcLabel}</span><span class="text-xs text-slate-500">${r.project}</span>${det.lastResearchDate?`<span class="text-xs text-slate-600 ml-auto">Last researched: ${new Date(det.lastResearchDate).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</span>`:''}</div>` +
      `<p class="text-sm text-slate-300 mb-3">${r.description}</p>` +
      (det.sourceDetail ? `<div class="detail-section"><p class="text-xs text-slate-500 uppercase tracking-wider mb-1">Source</p><p class="text-sm text-slate-400">${det.sourceDetail}</p></div>` : '') +
      (det.rationale ? `<div class="detail-section"><p class="text-xs text-slate-500 uppercase tracking-wider mb-1">Why This Was Recommended</p><p class="text-sm text-slate-300">${det.rationale}</p></div>` : '') +
      (det.relevance ? `<div class="detail-section"><p class="text-xs text-slate-500 uppercase tracking-wider mb-1">Relevance to ${r.project}</p><p class="text-sm text-slate-300">${det.relevance}</p></div>` : '') +
      `<div class="flex gap-4 mb-3">${dims.map(d=>`<div class="flex-1"><p class="text-xs text-slate-500">${d.l}</p><div class="score-bar mt-1"><div class="score-fill" style="width:${(d.v/3)*100}%;background:${d.c}"></div></div><p class="text-xs text-slate-400 mt-0.5">${d.v}/3</p></div>`).join('')}</div>` +
      `<div class="flex flex-wrap gap-2"><button onclick="event.stopPropagation();setRecSt('${r.id}','approved')" class="text-xs ${es==='approved'?'bg-green-600':'bg-green-800 hover:bg-green-700'} text-green-200 px-3 py-1 rounded">${es==='approved'?'\u2713 Approved':'Approve'}</button><button onclick="event.stopPropagation();setRecSt('${r.id}','archived')" class="text-xs bg-slate-700 hover:bg-slate-600 text-slate-300 px-3 py-1 rounded">Archive</button>${es!=='proposed'?`<button onclick="event.stopPropagation();setRecSt('${r.id}','proposed')" class="text-xs text-slate-500 hover:text-slate-300 px-3 py-1 rounded">Reset</button>`:''}` +
      `<button onclick="event.stopPropagation();toggleResearchForm('${r.id}')" class="text-xs bg-purple-800 hover:bg-purple-700 text-purple-200 px-3 py-1 rounded ml-auto">${hasPending?'Edit Research Request':'Start Further Research'}</button></div>` +
      `<div id="rf-${r.id}" class="hidden mt-3 pt-3 border-t border-border/50"><p class="text-xs text-slate-400 mb-2">Queue further research on this topic. Claude will use all saved research, competitor analysis, and project memory as context.</p><textarea id="rn-${r.id}" placeholder="What specific questions should Claude research? What angles to explore? (optional \u2014 Claude will research the topic broadly if left empty)" class="w-full bg-bg border border-border rounded px-3 py-2 text-sm text-white h-20 mb-2" onclick="event.stopPropagation()"></textarea><div class="flex gap-2"><button onclick="event.stopPropagation();saveResearchReq('${r.id}')" class="text-xs bg-purple-700 hover:bg-purple-600 text-purple-200 px-3 py-1 rounded">Save Research Request</button><button onclick="event.stopPropagation();document.getElementById('rf-${r.id}').classList.add('hidden')" class="text-xs text-slate-500 hover:text-slate-300 px-3 py-1">Cancel</button></div></div>` +
      `</div></div>`;
    }
    // New applyImpFilters — overrides the old one above (last assignment wins)
    window.applyImpFilters = function() {
      const list = document.getElementById('recList'); if (!list) return;
      const st = getRecStatuses();
      const pendingRes = JSON.parse(localStorage.getItem('pendingResearch')||'[]');
      let recs = D.recommendations.filter(r => {
        const es = st[r.id] || r.status;
        const lvl = r.level || 'project';
        if (impState.level !== 'all' && lvl !== impState.level) return false;
        if (impState.project !== 'all' && r.project !== impState.project) return false;
        if (impState.category !== 'all' && r.category !== impState.category) return false;
        if (impState.priority !== 'all' && r.priority !== impState.priority) return false;
        if (impState.status !== 'all' && es !== impState.status) return false;
        return true;
      });
      recs.sort((a,b) => impState.sort === 'total-desc' ? b.total - a.total : a.total - b.total);
      // Group by level
      const levelOrder = ['agency','department','project','agent'];
      const levelLabels = {agency:'Agency',department:'Department',project:'Project',agent:'Agent'};
      const levelColors = {agency:'#f59e0b',department:'#a855f7',project:'#3b82f6',agent:'#06b6d4'};
      const levelIcons = {agency:'\uD83C\uDFE2',department:'\uD83C\uDFD7\uFE0F',project:'\uD83D\uDCE6',agent:'\uD83E\uDD16'};
      const grouped = {};
      recs.forEach(r => { const lvl = r.level || 'project'; if (!grouped[lvl]) grouped[lvl] = []; grouped[lvl].push(r); });
      let html = '';
      levelOrder.forEach(lvl => {
        const items = grouped[lvl];
        if (!items || items.length === 0) return;
        const critCount = items.filter(r => r.priority === 'Critical').length;
        const highCount = items.filter(r => r.priority === 'High').length;
        html += `<div class="mb-2">`;
        html += `<div class="flex items-center gap-3 py-2 px-3 bg-card/50 rounded-lg border border-border/50 cursor-pointer" onclick="document.getElementById('lvl-${lvl}').classList.toggle('hidden');this.querySelector('.lvl-arrow').textContent=document.getElementById('lvl-${lvl}').classList.contains('hidden')?'\u25B8':'\u25BE'" style="border-left:4px solid ${levelColors[lvl]}">`;
        html += `<span class="lvl-arrow text-slate-400">\u25BE</span>`;
        html += `<span class="text-sm font-semibold text-white">${levelIcons[lvl]} ${levelLabels[lvl]}</span>`;
        html += `<span class="text-xs text-slate-400">${items.length} rec${items.length>1?'s':''}</span>`;
        if (critCount) html += `<span class="text-xs px-1.5 py-0.5 rounded bg-red-900/50 text-red-300">${critCount} Critical</span>`;
        if (highCount) html += `<span class="text-xs px-1.5 py-0.5 rounded bg-amber-900/50 text-amber-300">${highCount} High</span>`;
        html += `</div>`;
        html += `<div id="lvl-${lvl}" class="space-y-2 mt-2 ml-2">`;
        if (lvl === 'department') {
          const byDept = {};
          items.forEach(r => { const key = r.department || r.project; if (!byDept[key]) byDept[key] = []; byDept[key].push(r); });
          Object.keys(byDept).forEach(deptKey => {
            html += `<div class="mb-1"><p class="text-xs text-slate-500 uppercase tracking-wider mb-1 ml-1">${deptKey}</p>`;
            byDept[deptKey].forEach(r => { html += renderRecCard(r, st, pendingRes); });
            html += `</div>`;
          });
        } else if (lvl === 'agent') {
          const byAgent = {};
          items.forEach(r => { const key = r.agentId || 'unknown'; if (!byAgent[key]) byAgent[key] = []; byAgent[key].push(r); });
          Object.keys(byAgent).forEach(agentKey => {
            html += `<div class="mb-1"><p class="text-xs text-slate-500 uppercase tracking-wider mb-1 ml-1">${agentKey}</p>`;
            byAgent[agentKey].forEach(r => { html += renderRecCard(r, st, pendingRes); });
            html += `</div>`;
          });
        } else {
          items.forEach(r => { html += renderRecCard(r, st, pendingRes); });
        }
        html += `</div></div>`;
      });
      if (html === '') html = '<p class="text-sm text-slate-500 text-center py-8">No recommendations match the current filters</p>';
      list.innerHTML = html;
    };

    // ==================== AGENTS TAB ====================
    function renderAgents(c) {
      if (agentState.dept) { renderDeptDetail(c, agentState.dept); return; }
      c.innerHTML += '<div class="mb-4"><h2 class="text-lg font-semibold text-white">Agent Registry</h2><p class="text-sm text-slate-400">Products and infrastructure organized as agent departments</p></div>';
      // Summary

        grid.appendChild(d);
      });
      c.appendChild(grid);
    }
    function renderDeptDetail(c, deptId) {
      const dept = D.agents.departments.find(d=>d.id===deptId);
      if (!dept) { agentState.dept = null; render(); return; }
      c.innerHTML += `<div class="flex items-center gap-4 animate-in mb-4"><span class="back-btn text-slate-400 text-xl" onclick="agentState.dept=null;render()">\u2190</span><div><h2 class="text-lg font-semibold text-white">${dept.name}</h2><p class="text-xs text-slate-400">${dept.type} \u00B7 ${dept.liveCount}/${dept.agentCount} agents live \u00B7 ${dept.overallCompleteness}% complete</p></div></div>`;
      if (dept.agents.length === 0) { c.innerHTML += '<div class="bg-card rounded-xl border border-border p-6 text-center text-slate-500"><p class="text-lg mb-2">No agents defined yet</p><p class="text-sm">This department is in the planning/research phase.</p></div>'; return; }
      // Group by tier
      const tiers = [1,2,3];
      const tierNames = { 1: 'Tier 1 \u2014 Live / Core', 2: 'Tier 2 \u2014 Next Build', 3: 'Tier 3 \u2014 Strategic' };
      tiers.forEach(tier => {
        const agents = dept.agents.filter(a=>a.tier===tier);
        if (!agents.length) return;
        c.appendChild(el('h3',`text-xs font-semibold text-slate-500 uppercase tracking-wider mt-4 mb-2`,tierNames[tier]));
        agents.forEach((a,i) => {
          const card = el('div','bg-card rounded-xl border border-border p-4 mb-2 animate-in');
          card.style.animationDelay = `${i*0.05}s`;
          const stColor = a.status==='live'?'bg-green-900 text-green-300':a.status==='active'?'bg-blue-900 text-blue-300':'bg-slate-800 text-slate-400';
          const qPct = a.qualityScore || 0; const cPct = a.capabilityScore || 0;
          card.innerHTML = `<div class="flex items-center justify-between cursor-pointer" onclick="toggleAgentDetail('${a.id}')"><div class="flex items-center gap-3"><span class="tier-badge tier-${a.tier}">T${a.tier}</span><span class="font-medium text-white text-sm">${a.name}</span><span class="text-xs px-2 py-0.5 rounded-full ${stColor}">${a.status}</span></div><div class="flex items-center gap-4"><div class="w-24 hidden sm:block"><p class="text-xs text-slate-500 mb-0.5">Quality</p><div class="w-full bg-slate-700 rounded-full h-1"><div class="${barColor(qPct)} h-1 rounded-full" style="width:${qPct}%"></div></div></div><div class="w-24 hidden sm:block"><p class="text-xs text-slate-500 mb-0.5">Capability</p><div class="w-full bg-slate-700 rounded-full h-1"><div class="${barColor(cPct)} h-1 rounded-full" style="width:${cPct}%"></div></div></div><span class="text-slate-500 text-xs">\u25BC</span></div></div><div id="ad-${a.id}" class="expandable-content"><div class="mt-3 pt-3 border-t border-border/50"><p class="text-sm text-slate-300 mb-3">${a.description}</p><div class="grid grid-cols-2 gap-4 mb-3"><div><p class="text-xs text-slate-500 mb-1">Quality Score</p><div class="flex items-center gap-2"><div class="flex-1 bg-slate-700 rounded-full h-2"><div class="${barColor(qPct)} h-2 rounded-full" style="width:${qPct}%"></div></div><span class="text-sm font-bold text-white">${a.qualityScore !== null ? a.qualityScore + '/100' : 'N/A'}</span></div></div><div><p class="text-xs text-slate-500 mb-1">Capability vs Industry</p><div class="flex items-center gap-2"><div class="flex-1 bg-slate-700 rounded-full h-2"><div class="${barColor(cPct)} h-2 rounded-full" style="width:${cPct}%"></div></div><span class="text-sm font-bold text-white">${cPct}%</span></div></div></div>${a.tools.length?`<p class="text-xs text-slate-500 mb-1">Tools</p><div class="flex flex-wrap gap-1 mb-3">${a.tools.map(t=>`<span class="text-xs bg-slate-800 text-slate-300 px-2 py-0.5 rounded">${t}</span>`).join('')}</div>`:''}${a.benchmarks.length?`<p class="text-xs text-slate-500 mb-1">Industry Benchmarks</p><div class="overflow-x-auto"><table class="w-full text-xs mb-2"><thead><tr class="text-slate-500"><th class="text-left py-1 pr-3">Competitor</th><th class="text-left py-1 pr-3">Capability</th><th class="text-right py-1">Coverage</th></tr></thead><tbody>${a.benchmarks.map(b=>`<tr class="border-t border-border/30"><td class="py-1 pr-3 text-slate-300">${b.competitor}</td><td class="py-1 pr-3 text-slate-400">${b.capability}</td><td class="py-1 text-right"><span class="font-bold ${b.ourCoverage>=80?'text-green-400':b.ourCoverage>=50?'text-amber-400':b.ourCoverage>0?'text-red-400':'text-slate-500'}">${b.ourCoverage}%</span></td></tr>`).join('')}</tbody></table></div>`:''}</div>${a.subAgents.length?`<div class="mt-2"><p class="text-xs text-slate-500 mb-1">Sub-Agents (${a.subAgents.length})</p>${a.subAgents.map(sa=>`<div class="sub-agent py-1"><span class="text-xs text-slate-300">${sa.name}</span> <span class="text-xs px-1.5 py-0.5 rounded ${sa.status==='live'?'bg-green-900 text-green-300':'bg-slate-800 text-slate-400'}">${sa.status}</span></div>`).join('')}</div>`:''}</div>`;
          c.appendChild(card);
        });
      });
    }
    window.toggleAgentDetail = function(id) { const el = document.getElementById('ad-'+id); if (el) el.classList.toggle('open'); };

    // ==================== SHARED COMPONENTS ====================
    function el(tag, cls, txt) { const e = document.createElement(tag); if (cls) e.className = cls; if (txt) e.textContent = txt; return e; }
    function renderTasksTable(c, tasks, title) {
      const sorted = [...tasks].sort((a,b) => { const o = {'This Week':0,'In Progress':1,'Blocked':2,'Review':3,'Backlog':4,'Done':5}; return (o[a.status]??6) - (o[b.status]??6); });
      const s = el('section','');
      s.innerHTML = `<h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">${title||'Tasks'} <span class="text-slate-600">(${sorted.length})</span></h2><div class="bg-card rounded-xl border border-border overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="border-b border-border text-left text-slate-400 text-xs uppercase tracking-wider"><th class="px-4 py-3">Task</th><th class="px-4 py-3">Project</th><th class="px-4 py-3">Status</th><th class="px-4 py-3">Priority</th><th class="px-4 py-3">Last Activity</th></tr></thead><tbody>${sorted.map(t=>`<tr class="border-b border-border/50 hover:bg-slate-800/50"><td class="px-4 py-2.5"><a href="${t.url}" target="_blank" class="hover:text-blue-400">${t.name}</a></td><td class="px-4 py-2.5 text-slate-400">${t.project}</td><td class="px-4 py-2.5"><span class="status-chip ${chipClass(t.status)}">${t.status}</span></td><td class="px-4 py-2.5 text-slate-400">${t.priority}</td><td class="px-4 py-2.5 text-slate-400">${t.lastActivity}</td></tr>`).join('')}</tbody></table></div></div>`;
      c.appendChild(s);
    }
    function renderFinancialTable(c, items, title) {
      const costs = items.filter(f=>f.amount<0); const total = costs.reduce((s,f)=>s+Math.abs(f.amount),0);
      const s = el('section','');
      s.innerHTML = `<h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">${title||'Cost Breakdown'}</h2><div class="bg-card rounded-xl border border-border overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="border-b border-border text-left text-slate-400 text-xs uppercase tracking-wider"><th class="px-4 py-3">Service</th><th class="px-4 py-3">Project</th><th class="px-4 py-3">Category</th><th class="px-4 py-3 text-right">Amount</th></tr></thead><tbody>${costs.sort((a,b)=>a.amount-b.amount).map(f=>`<tr class="border-b border-border/50 hover:bg-slate-800/50"><td class="px-4 py-2.5">${f.description}</td><td class="px-4 py-2.5 text-slate-400">${f.project.replace(/^(CLIENT-\d+|PROD-\d+)\s+/,'')}</td><td class="px-4 py-2.5 text-slate-400">${f.category}</td><td class="px-4 py-2.5 text-right font-mono text-red-400">\u20AC${Math.abs(f.amount).toFixed(2)}</td></tr>`).join('')}${total>0?`<tr class="bg-slate-800/50 font-semibold"><td class="px-4 py-2.5" colspan="3">Total</td><td class="px-4 py-2.5 text-right font-mono text-amber-400">\u20AC${total.toFixed(2)}</td></tr>`:''}</tbody></table></div></div>`;
      c.appendChild(s);
    }
    function renderTaskStatusChart() {
      const sc = {}; D.tasks.forEach(t=>{sc[t.status]=(sc[t.status]||0)+1;});
      const so = ['This Week','In Progress','Blocked','Review','Backlog','Done'], cl = {'This Week':'#3b82f6','In Progress':'#22c55e','Blocked':'#ef4444','Review':'#a855f7','Backlog':'#64748b','Done':'#14532d'};
      const ctx = document.getElementById('taskStatusChart'); if(!ctx)return;
      chartInstances.push(new Chart(ctx,{type:'bar',data:{labels:so.filter(s=>sc[s]),datasets:[{data:so.filter(s=>sc[s]).map(s=>sc[s]),backgroundColor:so.filter(s=>sc[s]).map(s=>cl[s]),borderRadius:6,barThickness:32}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#94a3b8',font:{size:11}}},y:{grid:{color:'#334155'},ticks:{color:'#94a3b8',stepSize:5},beginAtZero:true}}}}));
    }
    function renderCostChart() {
      const cp = {}; D.financial.forEach(f=>{if(f.amount<0){const k=f.project.replace(/^(CLIENT-\d+|PROD-\d+)\s+/,'');cp[k]=(cp[k]||0)+Math.abs(f.amount);}});
      const cl = Object.keys(cp).sort((a,b)=>cp[b]-cp[a]), cc = ['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#22c55e','#06b6d4'];
      const ctx = document.getElementById('costChart'); if(!ctx)return;
      chartInstances.push(new Chart(ctx,{type:'doughnut',data:{labels:cl,datasets:[{data:cl.map(l=>cp[l]),backgroundColor:cc.slice(0,cl.length),borderWidth:0}]},options:{responsive:true,cutout:'65%',plugins:{legend:{position:'right',labels:{color:'#94a3b8',padding:12,font:{size:11}}}}}}));
    }
    render();
  </script>
</body>
</html>
