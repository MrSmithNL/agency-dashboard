          <select class="filter-select" onchange="devopsState.logOutcome = this.value; render();">
            <option value="all" ${devopsState.logOutcome==='all'?'selected':''}>All outcomes</option>
            <option value="success" ${devopsState.logOutcome==='success'?'selected':''}>Success</option>
            <option value="partial" ${devopsState.logOutcome==='partial'?'selected':''}>Partial</option>
            <option value="failed" ${devopsState.logOutcome==='failed'?'selected':''}>Failed</option>
          </select>
        </div>
      </div>`;
      logHTML += '<div class="bg-card rounded-xl border border-border overflow-hidden"><table class="w-full text-left"><thead><tr class="border-b border-border bg-slate-800/50"><th class="p-3 text-xs text-slate-400 font-medium">Date</th><th class="p-3 text-xs text-slate-400 font-medium">Type</th><th class="p-3 text-xs text-slate-400 font-medium">Project</th><th class="p-3 text-xs text-slate-400 font-medium">Description</th><th class="p-3 text-xs text-slate-400 font-medium text-center">Outcome</th><th class="p-3 text-xs text-slate-400 font-medium text-center">Files</th></tr></thead><tbody>';
      filteredLog.forEach(e => {
        const outcomeColors = { success: 'bg-green-900/30 text-green-400', partial: 'bg-amber-900/30 text-amber-400', failed: 'bg-red-900/30 text-red-400' };
        const oc = outcomeColors[e.outcome] || 'bg-slate-800 text-slate-400';
        const typeColors = { manual: 'bg-blue-900/30 text-blue-400', scheduled: 'bg-purple-900/30 text-purple-400', 'standing-order': 'bg-purple-900/30 text-purple-400' };
        const tc = typeColors[e.type] || 'bg-slate-800 text-slate-400';
        logHTML += `<tr class="border-b border-border/30 hover:bg-slate-800/50">
          <td class="p-3 text-xs text-slate-500">${e.date}</td>
          <td class="p-3"><span class="text-xs px-2 py-0.5 rounded ${tc}">${e.type}</span></td>
          <td class="p-3 text-xs text-slate-300">${e.project}</td>
          <td class="p-3 text-xs text-slate-300">${e.description}</td>
          <td class="p-3 text-center"><span class="text-xs px-2 py-0.5 rounded ${oc}">${e.outcome}</span></td>
          <td class="p-3 text-center text-xs text-slate-400">${e.filesChanged}</td>
        </tr>`;
      });
      logHTML += '</tbody></table></div>';
      s5.innerHTML = logHTML;
      c.appendChild(s5);

      // ---------- Section 6: Quick Access ----------
      const s6 = document.createElement('div');
      s6.className = 'animate-in mt-6';
      let qaHTML = '<h2 class="text-lg font-semibold text-white mb-4">Quick Access</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-3">';
      const typeIcons = { doc: '\uD83D\uDCC4', log: '\uD83D\uDCCB', objective: '\uD83C\uDFAF', research: '\uD83D\uDD2C', external: '\uD83D\uDD17' };
      const typeColors = { doc: 'border-blue-500/30', log: 'border-amber-500/30', objective: 'border-green-500/30', research: 'border-purple-500/30', external: 'border-slate-500/30' };
      DV.quickAccess.forEach(qa => {
        const icon = typeIcons[qa.type] || '\uD83D\uDCC1';
        const borderCls = typeColors[qa.type] || '';
        const href = qa.url || (repoBase + qa.path);
        qaHTML += `<a href="${href}" target="_blank" class="bg-card rounded-lg p-3 border ${borderCls} hover:bg-slate-800/80 flex items-center gap-3 transition-colors">
          <span class="text-lg">${icon}</span>
          <div>
            <p class="text-sm text-white">${qa.name}</p>
            <p class="text-xs text-slate-500">${qa.path || qa.url}</p>
          </div>
        </a>`;
      });
      qaHTML += '</div>';
      s6.innerHTML = qaHTML;
      c.appendChild(s6);
    }

    // ==================== RESEARCH VIEW ====================
    function renderResearch(c) {
      const R = D.research;

      // ---------- KPI Cards ----------
      const kpis = el('div','grid grid-cols-2 md:grid-cols-4 gap-4 animate-in');
      const kpiData = [
        { label: 'Queued', value: R.stats.queued, color: R.stats.queued > 0 ? 'text-amber-400' : 'text-slate-400' },
        { label: 'In Progress', value: R.stats.inProgress, color: R.stats.inProgress > 0 ? 'text-blue-400' : 'text-slate-400' },
        { label: 'Completed', value: R.stats.done, color: 'text-green-400' },
        { label: 'Total Sources', value: R.stats.totalSources, color: 'text-purple-400' },
      ];
      kpiData.forEach((k,i) => {
        kpis.innerHTML += `<div class="bg-card rounded-xl border border-border p-4 animate-in" style="animation-delay:${i*0.05}s">
          <p class="text-xs text-slate-400 uppercase tracking-wider">${k.label}</p>
          <p class="text-2xl font-bold ${k.color} mt-1">${k.value}</p>
        </div>`;
      });
      c.appendChild(kpis);

      // ---------- Recent Reports ----------
      const s2 = el('div','animate-in mt-6');
      let repHTML = '<h2 class="text-lg font-semibold text-white mb-4">Recent Research Reports</h2>';
      if (R.recentReports.length === 0) {
        repHTML += '<p class="text-slate-400">No research reports yet. Add a topic to the backlog and the nightly worker will run it.</p>';
      } else {
        repHTML += '<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-left text-slate-400 border-b border-border">';
        repHTML += '<th class="pb-2 pr-4">Date</th><th class="pb-2 pr-4">Topic</th><th class="pb-2 pr-4">Depth</th><th class="pb-2 pr-4">Sources</th><th class="pb-2 pr-4">Sections</th><th class="pb-2 pr-4">Recommendations</th><th class="pb-2">Risks</th>';
        repHTML += '</tr></thead><tbody>';
        R.recentReports.forEach(r => {
          repHTML += `<tr class="border-b border-border/50 hover:bg-white/5">
            <td class="py-3 pr-4 text-slate-300">${r.date}</td>
            <td class="py-3 pr-4 text-white font-medium">${r.topic}</td>
            <td class="py-3 pr-4"><span class="text-xs px-2 py-0.5 rounded bg-purple-900/30 text-purple-400">${r.depth}</span></td>
            <td class="py-3 pr-4 text-slate-300">${r.sources}</td>
            <td class="py-3 pr-4 text-slate-300">${r.sections}</td>
            <td class="py-3 pr-4 text-slate-300">${r.recommendations}</td>
            <td class="py-3 text-slate-300">${r.risks}</td>
          </tr>`;
        });
        repHTML += '</tbody></table></div>';
      }
      s2.innerHTML = repHTML;
      c.appendChild(s2);

      // ---------- Backlog ----------
      const s3 = el('div','animate-in mt-6');
      let blHTML = '<h2 class="text-lg font-semibold text-white mb-4">Research Backlog</h2>';
      const queued = R.backlog.filter(b => b.status === 'queued');
      const inProg = R.backlog.filter(b => b.status === 'in_progress');
      const done = R.backlog.filter(b => b.status === 'done');
      const blocked = R.backlog.filter(b => b.status === 'blocked');
      const allItems = [...inProg, ...queued, ...blocked, ...done];
      if (allItems.length === 0) {
        blHTML += '<p class="text-slate-400">Backlog is empty. Add a research topic to get started.</p>';
      } else {
        blHTML += '<div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-left text-slate-400 border-b border-border">';
        blHTML += '<th class="pb-2 pr-4">ID</th><th class="pb-2 pr-4">Topic</th><th class="pb-2 pr-4">Depth</th><th class="pb-2 pr-4">Priority</th><th class="pb-2 pr-4">Status</th><th class="pb-2 pr-4">Sources</th><th class="pb-2">Completed</th>';
        blHTML += '</tr></thead><tbody>';
        allItems.forEach(b => {
          const statusColors = { queued: 'bg-amber-900/30 text-amber-400', in_progress: 'bg-blue-900/30 text-blue-400', done: 'bg-green-900/30 text-green-400', blocked: 'bg-red-900/30 text-red-400' };
          const sc = statusColors[b.status] || 'bg-slate-800 text-slate-400';
          const prioColors = { P1: 'text-red-400', P2: 'text-amber-400', P3: 'text-slate-400' };
          const pc = prioColors[b.priority] || 'text-slate-400';
          blHTML += `<tr class="border-b border-border/50 hover:bg-white/5">
            <td class="py-3 pr-4 text-slate-400 font-mono text-xs">${b.id}</td>
            <td class="py-3 pr-4 text-white">${b.topic}</td>
            <td class="py-3 pr-4"><span class="text-xs px-2 py-0.5 rounded bg-purple-900/30 text-purple-400">${b.depth}</span></td>
            <td class="py-3 pr-4 font-semibold ${pc}">${b.priority}</td>
            <td class="py-3 pr-4"><span class="text-xs px-2 py-0.5 rounded ${sc}">${b.status.replace('_',' ')}</span></td>
            <td class="py-3 pr-4 text-slate-300">${b.sources || '\u2014'}</td>
            <td class="py-3 text-slate-300">${b.completed || '\u2014'}</td>
          </tr>`;
        });
        blHTML += '</tbody></table></div>';
      }
      s3.innerHTML = blHTML;
      c.appendChild(s3);

      // ---------- Key Findings ----------
      const s4 = el('div','animate-in mt-6');
      let findHTML = '<h2 class="text-lg font-semibold text-white mb-4">Key Findings</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-4">';
      R.completed.forEach(r => {
        findHTML += `<div class="bg-card rounded-xl border border-border p-4">
          <div class="flex items-center gap-2 mb-2">
            <span class="text-xs font-mono text-slate-500">${r.id}</span>
            <span class="text-xs text-slate-500">${r.completed}</span>
          </div>
          <p class="text-white font-medium mb-2">${r.topic}</p>
          <p class="text-sm text-slate-300">${r.keyFinding}</p>
          <p class="text-xs text-slate-500 mt-2">${r.sources} sources</p>
        </div>`;
      });
      findHTML += '</div>';
      s4.innerHTML = findHTML;
      c.appendChild(s4);

      // ---------- Process Info ----------
      const s5 = el('div','animate-in mt-6');
      s5.innerHTML = `<div class="bg-card rounded-xl border border-border p-4">
        <h2 class="text-lg font-semibold text-white mb-3">Research Process</h2>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-sm">
          <div><p class="text-slate-400 text-xs uppercase mb-1">Schedule</p><p class="text-white">Every night at 01:00</p></div>
          <div><p class="text-slate-400 text-xs uppercase mb-1">Worker</p><p class="text-white">Nightly Research Worker</p></div>
          <div><p class="text-slate-400 text-xs uppercase mb-1">Average Depth</p><p class="text-white">${R.stats.avgDepth}</p></div>
          <div><p class="text-slate-400 text-xs uppercase mb-1">How to Add</p><p class="text-white">Tell Claude or edit research-backlog.md</p></div>
        </div>
      </div>`;
      c.appendChild(s5);
    }

    render();
  </script>
</body>
</html>
