<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smith AI Agency — Cockpit</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%233b82f6'/><text x='16' y='23' text-anchor='middle' fill='white' font-family='system-ui' font-weight='bold' font-size='20'>S</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0f172a',
            card: '#1e293b',
            border: '#334155',
            accent: '#3b82f6',
            green: { 500: '#22c55e', 900: '#14532d' },
            amber: { 500: '#f59e0b', 900: '#78350f' },
            red: { 500: '#ef4444', 900: '#7f1d1d' },
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0f172a; font-family: 'Inter', system-ui, sans-serif; }
    .progress-bar { transition: width 0.8s ease-out; }
    .rag-green { color: #22c55e; } .rag-amber { color: #f59e0b; } .rag-red { color: #ef4444; }
    .status-chip { font-size: 0.7rem; padding: 2px 8px; border-radius: 9999px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .chip-thisweek { background: #1e3a5f; color: #60a5fa; } .chip-inprogress { background: #1a3a2a; color: #4ade80; }
    .chip-blocked { background: #3b1818; color: #f87171; } .chip-backlog { background: #27272a; color: #a1a1aa; }
    .chip-done { background: #14532d; color: #86efac; } .chip-review { background: #2e1065; color: #c084fc; }
    .trend-up::after { content: ' \2191'; color: #22c55e; } .trend-down::after { content: ' \2193'; color: #ef4444; } .trend-flat::after { content: ' \2192'; color: #94a3b8; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeIn 0.4s ease-out forwards; }
    .clickable-card { cursor: pointer; transition: transform 0.15s, border-color 0.15s; } .clickable-card:hover { transform: translateY(-2px); border-color: #3b82f6; }
    .back-btn { cursor: pointer; transition: color 0.15s; } .back-btn:hover { color: #60a5fa; }
    .type-client { border-left: 3px solid #22c55e; } .type-product { border-left: 3px solid #3b82f6; } .type-infrastructure { border-left: 3px solid #a855f7; }
    .warning-chip { background: #78350f; color: #fbbf24; font-size: 0.65rem; padding: 1px 6px; border-radius: 9999px; }
    /* Tab nav */
    .tab-btn { cursor: pointer; } .tab-btn.active { color: #fff !important; border-bottom-color: #3b82f6 !important; }
    /* Calendar */
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cal-day { min-height: 72px; cursor: pointer; transition: background 0.15s; } .cal-day:hover { background: #334155; }
    .cal-day.today { border: 1px solid #3b82f6; } .cal-day.selected { background: #1e3a5f; }
    .cal-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    .dot-recipe { background: #3b82f6; } .dot-standing-order { background: #a855f7; } .dot-deadline { background: #f59e0b; }
    /* Improvement */
    .expandable-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; } .expandable-content.open { max-height: 1500px; }
    .detail-section { border-left: 2px solid #334155; padding-left: 12px; margin-bottom: 12px; }
    .source-tag { font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; background: #1e293b; border: 1px solid #334155; }
    .score-bar { height: 4px; border-radius: 2px; background: #334155; } .score-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease-out; }
    /* Agents */
    .gauge-bg { fill: none; stroke: #334155; stroke-width: 6; } .gauge-fill { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.8s ease-out; }
    .tier-badge { font-size: 0.6rem; padding: 1px 5px; border-radius: 4px; font-weight: 700; }
    .tier-1 { background: #14532d; color: #86efac; } .tier-2 { background: #1e3a5f; color: #60a5fa; } .tier-3 { background: #27272a; color: #a1a1aa; }
    .sub-agent { border-left: 2px solid #334155; margin-left: 16px; padding-left: 12px; }
    .agent-subtab { cursor: pointer; transition: color 0.15s, border-color 0.15s; }
    .agent-subtab.active { color: #fff; border-bottom-color: currentColor; }
    .dept-chip { font-size: 0.65rem; padding: 2px 8px; border-radius: 9999px; font-weight: 600; }
    .process-card { border-left: 3px solid #334155; }
    .process-agents { display: flex; flex-wrap: wrap; gap: 6px; }
    /* Process pipeline */
    .pipeline { display: flex; gap: 0; overflow-x: auto; padding-bottom: 4px; }
    .pipeline-stage { position: relative; flex: 1; min-width: 120px; padding: 10px 12px 10px 20px; background: #1e293b; color: #e2e8f0; font-size: 0.75rem; font-weight: 600; clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%, 14px 50%); cursor: pointer; transition: filter 0.15s; text-align: center; border: none; }
    .pipeline-stage:first-child { clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%); padding-left: 12px; }
    .pipeline-stage:hover { filter: brightness(1.3); }
    .pipeline-stage.stage-active { outline: 2px solid #3b82f6; outline-offset: -2px; z-index: 1; }
    .pipeline-stage .stage-num { display: block; font-size: 0.6rem; color: #64748b; font-weight: 400; margin-bottom: 2px; }
    .pipeline-stage .stage-agents { display: block; font-size: 0.6rem; font-weight: 400; color: #94a3b8; margin-top: 2px; }
    .process-detail { border-top: 2px solid #334155; }
    .agent-process-card { transition: transform 0.15s, border-color 0.15s; }
    .agent-process-card:hover { transform: translateY(-1px); }
    .bu-card { transition: transform 0.15s, border-color 0.15s; } .bu-card:hover { transform: translateY(-2px); }
    .org-kpi { text-align: center; }
    .service-tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
    select.filter-select { background: #0f172a; border: 1px solid #334155; border-radius: 6px; padding: 4px 8px; font-size: 0.75rem; color: #e2e8f0; }
    /* Agent Army */
    .army-search { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 8px 12px; font-size: 0.85rem; color: #e2e8f0; width: 100%; }
    .army-search:focus { outline: none; border-color: #3b82f6; }
    .domain-pill { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
    .domain-pill:hover { filter: brightness(1.2); }
    .domain-pill.active { border-color: currentColor; }
    .skill-row { transition: background 0.15s; cursor: pointer; } .skill-row:hover { background: #1e3a5f; }
    .type-dot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; }
    .maturity-bar { height: 3px; border-radius: 2px; background: #334155; width: 60px; } .maturity-fill { height: 100%; border-radius: 2px; }
    .army-layer { border-left: 3px solid; padding: 16px; background: #1e293b; border-radius: 0 12px 12px 0; }
    .strategy-toggle { cursor: pointer; user-select: none; transition: background 0.15s; } .strategy-toggle:hover { background: #334155; }
    /* Architecture diagrams */
    .arch-node { cursor: pointer; transition: opacity 0.15s, filter 0.15s; } .arch-node:hover { opacity: 0.9; filter: brightness(1.2); }
    .arch-toggle { cursor: pointer; user-select: none; } .arch-toggle:hover { background: #334155; }
    .arch-chevron { transition: transform 0.3s ease; display: inline-block; } .arch-chevron.open { transform: rotate(90deg); }
    .arch-detail { background: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 16px; margin-top: 12px; animation: fadeIn 0.3s ease-out; }
    .arch-detail-row { display: flex; gap: 8px; margin-bottom: 8px; } .arch-detail-label { color: #64748b; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; min-width: 80px; flex-shrink: 0; } .arch-detail-value { color: #cbd5e1; font-size: 0.8rem; }
  </style>
</head>
<body class="text-slate-200 min-h-screen">
  <script src="data.js?v=20260309a"></script>

  <header class="border-b border-border px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-accent flex items-center justify-center font-bold text-white text-sm clickable-card" onclick="navigateTo('')">S</div>
      <div>
        <h1 class="text-lg font-semibold text-white"><a href="#" onclick="navigateTo(''); return false;" class="hover:text-blue-400">Smith AI Agency</a></h1>
        <p class="text-xs text-slate-400" id="breadcrumb">Performance Cockpit</p>
      </div>
    </div>
    <div class="text-right">
      <p class="text-xs text-slate-400">Last sync</p>
      <p class="text-sm text-slate-300" id="lastSync"></p>
    </div>
  </header>

  <!-- Tab Navigation -->
  <nav class="border-b border-border bg-card/50" id="tabNav">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 flex gap-1 overflow-x-auto">
      <button onclick="navigateTo('')" data-tab="home" class="tab-btn px-4 py-3 text-sm font-medium text-slate-400 hover:text-white border-b-2 border-transparent transition-colors whitespace-nowrap">Cockpit</button>
      <button onclick="navigateTo('calendar')" data-tab="calendar" class="tab-btn px-4 py-3 text-sm font-medium text-slate-400 hover:text-white border-b-2 border-transparent transition-colors whitespace-nowrap">Calendar</button>
      <button onclick="navigateTo('improvement')" data-tab="improvement" class="tab-btn px-4 py-3 text-sm font-medium text-slate-400 hover:text-white border-b-2 border-transparent transition-colors whitespace-nowrap">Improvement</button>
      <button onclick="navigateTo('organisation')" data-tab="organisation" class="tab-btn px-4 py-3 text-sm font-medium text-slate-400 hover:text-white border-b-2 border-transparent transition-colors whitespace-nowrap">Organisation</button>
      <button onclick="navigateTo('agents')" data-tab="agents" class="tab-btn px-4 py-3 text-sm font-medium text-slate-400 hover:text-white border-b-2 border-transparent transition-colors whitespace-nowrap">Agents</button>
      <button onclick="navigateTo('agent-army')" data-tab="agent-army" class="tab-btn px-4 py-3 text-sm font-medium text-slate-400 hover:text-white border-b-2 border-transparent transition-colors whitespace-nowrap">Agent Army</button>
      <button onclick="navigateTo('research')" data-tab="research" class="tab-btn px-4 py-3 text-sm font-medium text-slate-400 hover:text-white border-b-2 border-transparent transition-colors whitespace-nowrap">Research</button>
      <button onclick="navigateTo('devops')" data-tab="devops" class="tab-btn px-4 py-3 text-sm font-medium text-slate-400 hover:text-white border-b-2 border-transparent transition-colors whitespace-nowrap">DevOps</button>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 space-y-6" id="mainContent"></main>

  <footer class="border-t border-border px-6 py-4 text-center text-xs text-slate-500">
    <a href="https://docs.google.com/spreadsheets/d/1iZUsOKh1hAR0qtnu5HGk9WxTEXMuaZcvKY5pF0TVEJI/edit" target="_blank" class="hover:text-slate-300">View Google Sheet</a>
    &middot; Auto-generated by Claude Code
  </footer>

  <script>
    const D = DASHBOARD_DATA;
    const chartInstances = [];

    // ==================== UTILITIES ====================
    function destroyCharts() { chartInstances.forEach(c => c.destroy()); chartInstances.length = 0; }
    function chipClass(s) { return { 'This Week':'chip-thisweek','In Progress':'chip-inprogress','Blocked':'chip-blocked','Review':'chip-review','Done':'chip-done' }[s] || 'chip-backlog'; }
    function ragClass(r) { return r === 'Green' ? 'rag-green' : r === 'Amber' ? 'rag-amber' : 'rag-red'; }
    function trendClass(t) { return t === 'up' ? 'trend-up' : t === 'down' ? 'trend-down' : 'trend-flat'; }
    function typeClass(t) { return t === 'Client' ? 'type-client' : t === 'Product' ? 'type-product' : 'type-infrastructure'; }
    function barColor(p) { return p === null ? 'bg-slate-600' : p >= 80 ? 'bg-green-500' : p >= 50 ? 'bg-amber-500' : 'bg-red-500'; }
    function barHex(p) { return p >= 80 ? '#22c55e' : p >= 50 ? '#f59e0b' : '#ef4444'; }
    function formatMetricValue(m) {
      if (m.format === 'currency') return '\u20AC' + (typeof m.value === 'number' ? m.value.toFixed(2) : m.value);
      if (m.format === 'score') return m.value + '/100'; if (m.format === 'boolean') return m.label || (m.value ? 'Yes' : 'No');
      if (m.format === 'seconds') return m.value > 0 ? (m.value / 60).toFixed(1) + ' min' : '0';
      if (m.format === 'position') return '#' + m.value; if (m.format === 'ratio') return m.value + '/' + m.target;
      return String(m.value);
    }
    function metricPct(m) { if (!m.target || m.target === 0) return null; if (m.lowerIsBetter) return Math.min(100, (m.target / m.value) * 100); if (m.format === 'boolean') return m.value ? 100 : 0; return Math.min(100, (m.value / m.target) * 100); }
    function projectLabelForTask(tp) { return { 'LOE':'CLIENT-001','Hairgenetix':'CLIENT-002','SEO':'PROD-001','SF':'PROD-002','INFRA':'INFRA' }[tp] || tp; }
    function tasksForProject(pid) { const d = D.projectDetails[pid]; if (!d) return []; const c = d.code; return D.tasks.filter(t => { const l = projectLabelForTask(t.project); return l === c || (c.startsWith('INFRA') && l === 'INFRA' && t.name.toLowerCase().includes(c.toLowerCase().replace('infra-','infra-0'))); }); }
    function costsForProject(pid) { const d = D.projectDetails[pid]; if (!d) return []; return D.financial.filter(f => f.project.toLowerCase().includes(d.name.toLowerCase()) || f.project.toLowerCase().includes(d.code.toLowerCase())); }

    // ==================== ROUTING ====================
    function navigateTo(r) { window.location.hash = r ? '#/' + r : '#'; }
    function getRoute() { const h = window.location.hash; if (!h || h === '#' || h === '#/') return 'home'; return h.replace('#/', ''); }
    window.addEventListener('hashchange', render);

    const syncDate = new Date(D.lastSync);
    document.getElementById('lastSync').textContent = syncDate.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });

    // State
    let calState = { month: new Date().getMonth(), year: new Date().getFullYear(), selected: null };
    let impState = { level: 'all', project: 'all', category: 'all', priority: 'all', status: 'all', sort: 'total-desc' };
    let agentState = { subTab: 'departments', dept: null, product: null, client: null, expandedAgent: null };
    let orgState = { bu: null, dept: null };
    let armyState = { domain: 'all', type: 'all', maturity: 'all', search: '', selectedSkill: null, showStrategy: false };

    function render() {
      destroyCharts();
      const route = getRoute();
      const main = document.getElementById('mainContent');
      main.innerHTML = '';
      // Tab highlighting
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      const tabMap = { home:'home', calendar:'calendar', improvement:'improvement', organisation:'organisation', agents:'agents', 'agent-army':'agent-army', research:'research', devops:'devops' };
      const ab = document.querySelector(`[data-tab="${tabMap[route] || 'home'}"]`);
      if (ab) ab.classList.add('active');
      const isProject = !!D.projectDetails[route];
      document.getElementById('tabNav').style.display = isProject ? 'none' : '';

      if (route === 'home') { renderHome(main); document.getElementById('breadcrumb').textContent = 'Performance Cockpit'; document.title = 'Smith AI Agency \u2014 Cockpit'; }
      else if (route === 'calendar') { renderCalendar(main); document.getElementById('breadcrumb').textContent = 'Calendar & Scheduler'; document.title = 'Smith AI Agency \u2014 Calendar'; }
      else if (route === 'improvement') { renderImpHierarchy(main); document.getElementById('breadcrumb').textContent = 'Continuous Improvement'; document.title = 'Smith AI Agency \u2014 Improvement'; }
      else if (route === 'organisation') { renderOrganisation(main); document.getElementById('breadcrumb').textContent = 'Organisation'; document.title = 'Smith AI Agency \u2014 Organisation'; }
      else if (route === 'agents') { renderAgents(main); document.getElementById('breadcrumb').textContent = 'Agent Registry'; document.title = 'Smith AI Agency \u2014 Agents'; }
      else if (route === 'agent-army') { renderAgentArmy(main); document.getElementById('breadcrumb').textContent = 'Agent Army'; document.title = 'Smith AI Agency \u2014 Agent Army'; }
      else if (route === 'research') { renderResearch(main); document.getElementById('breadcrumb').textContent = 'Research'; document.title = 'Smith AI Agency \u2014 Research'; }
      else if (route === 'devops') { renderDevOps(main); document.getElementById('breadcrumb').textContent = 'Autonomous DevOps'; document.title = 'Smith AI Agency \u2014 DevOps'; }
      else if (isProject) { renderProjectDetail(main, route); const det = D.projectDetails[route]; document.getElementById('breadcrumb').innerHTML = '<span class="back-btn" onclick="navigateTo(\'\')">\u2190 Cockpit</span> / ' + det.code + ' ' + det.name; document.title = det.code + ' ' + det.name + ' \u2014 Cockpit'; }
      else { main.innerHTML = '<p class="text-slate-400">Page not found. <a href="#" class="text-blue-400 hover:underline" onclick="navigateTo(\'\'); return false;">Back to Cockpit</a></p>'; }
    }

    // ==================== HOME VIEW ====================
    function renderHome(c) {
      // KPIs
      const kg = el('div','grid grid-cols-2 md:grid-cols-4 gap-4');
      D.agencyKPIs.slice(0,4).forEach((k,i) => {
        const color = k.name.includes('Burn') ? 'text-amber-400' : k.name.includes('Revenue') ? 'text-green-400' : k.name.includes('Blocked') ? (k.value > 0 ? 'text-red-400' : 'text-green-400') : 'text-blue-400';
        kg.innerHTML += `<div class="bg-card rounded-xl border border-border p-4 animate-in" style="animation-delay:${i*0.1}s"><p class="text-xs text-slate-400 uppercase tracking-wider">${k.name}</p><p class="text-2xl font-bold ${color} mt-1 ${trendClass(k.trend)}">${formatMetricValue(k)}</p>${k.target !== null ? `<p class="text-xs text-slate-500 mt-1">Target: ${k.format==='currency'?'\u20AC'+k.target:k.target}</p>` : ''}</div>`;
      });
      c.appendChild(kg);
      // Secondary KPIs
      const sg = el('div','grid grid-cols-2 md:grid-cols-4 gap-4');
      D.agencyKPIs.slice(4).forEach((k,i) => { sg.innerHTML += `<div class="bg-card rounded-xl border border-border p-3 animate-in" style="animation-delay:${(i+4)*0.1}s"><p class="text-xs text-slate-400 uppercase tracking-wider">${k.name}</p><p class="text-lg font-bold text-slate-200 mt-1 ${trendClass(k.trend)}">${formatMetricValue(k)}</p></div>`; });
      c.appendChild(sg);
      // Projects
      c.appendChild(el('h2','text-sm font-semibold text-slate-400 uppercase tracking-wider','Project Performance \u2014 Click to drill down'));
      const pg = el('div','grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4');
      D.overview.forEach((p,i) => {
        const pct = p.omtmTarget > 0 ? Math.min(100,(p.omtmValue/p.omtmTarget)*100) : 0;
        const short = p.project.replace(/^(CLIENT-\d+|PROD-\d+|INFRA-\d+)\s+/,'');
        const det = D.projectDetails[p.id]; const tl = det ? det.type : ''; const mc = det?.missingMetrics?.length || 0;
        const d = el('div',`bg-card rounded-xl border border-border p-4 animate-in clickable-card ${det?typeClass(tl):''}`);
        d.style.animationDelay = `${i*0.08}s`; d.onclick = () => navigateTo(p.id);
        d.innerHTML = `<div class="flex items-center justify-between mb-2"><h3 class="font-semibold text-white text-sm">${short}</h3><div class="flex items-center gap-2">${mc>0?`<span class="warning-chip">${mc} gap${mc>1?'s':''}</span>`:''}<span class="${ragClass(p.rag)} text-lg font-bold">\u25CF</span></div></div><p class="text-xs text-slate-400 mb-1">${p.omtmName}</p><div class="flex items-baseline gap-1 mb-2"><span class="text-xl font-bold text-white ${trendClass(p.trend)}">${p.omtmValue}</span><span class="text-xs text-slate-500">/ ${p.omtmTarget}</span></div><div class="w-full bg-slate-700 rounded-full h-1.5"><div class="${barColor(pct)} h-1.5 rounded-full progress-bar" style="width:${pct}%"></div></div><p class="text-xs text-slate-500 mt-2">${p.focus}</p><p class="text-xs text-slate-600 mt-1">${tl} \u00B7 Click for details \u2192</p>`;
        pg.appendChild(d);
      });
      c.appendChild(pg);
      // Charts
      const cr = el('div','grid grid-cols-1 md:grid-cols-2 gap-4');
      cr.innerHTML = '<div class="bg-card rounded-xl border border-border p-5"><h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">Tasks by Status</h3><canvas id="taskStatusChart" height="200"></canvas></div><div class="bg-card rounded-xl border border-border p-5"><h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">Monthly Costs (EUR)</h3><canvas id="costChart" height="200"></canvas></div>';
      c.appendChild(cr);
      requestAnimationFrame(() => { renderTaskStatusChart(); renderCostChart(); });
      renderTasksTable(c, D.tasks.filter(t=>t.status!=='Done'), 'Active Tasks');
      renderFinancialTable(c, D.financial);
    }

    // ==================== ARCHITECTURE DIAGRAM ====================
    function renderArchDiagram(container, arch) {
      const typeColor = { app:'#3b82f6', hosting:'#22c55e', data:'#f59e0b', api:'#a855f7', tool:'#64748b', service:'#06b6d4', status:'#475569' };
      const typeLabel = { app:'Application', hosting:'Hosting', data:'Data', api:'API', tool:'Tool', service:'Service', status:'Status' };
      const nw = 130, nh = 52, gapX = 24, gapY = 80, padX = 40, padY = 10, labelH = 28;
      const nodeMap = {}; arch.nodes.forEach(n => nodeMap[n.id] = n);
      // Layers are now objects with { name, nodes }
      const layers = arch.layers.map(l => Array.isArray(l) ? { name: '', nodes: l } : l);
      // Calculate positions
      let maxRowW = 0;
      const positions = {};
      layers.forEach(layer => {
        const rowW = layer.nodes.length * nw + (layer.nodes.length - 1) * gapX;
        if (rowW > maxRowW) maxRowW = rowW;
      });
      const labelPadL = 100; // space for layer label on left
      layers.forEach((layer, ri) => {
        const rowW = layer.nodes.length * nw + (layer.nodes.length - 1) * gapX;
        const offsetX = (maxRowW - rowW) / 2;
        layer.nodes.forEach((nid, ci) => {
          positions[nid] = { x: labelPadL + padX + offsetX + ci * (nw + gapX), y: padY + ri * (nh + gapY + labelH) + labelH };
        });
      });

    // ==================== CALENDAR TAB ====================
    function matchesCron(cron, date) {
      const [,, dom, mon, dow] = cron.split(' ');
      const d = new Date(date);
      if (dom !== '*' && parseInt(dom) !== d.getDate()) return false;
      if (mon !== '*' && parseInt(mon) !== d.getMonth() + 1) return false;
      if (dow !== '*') { const wd = d.getDay(); if (dow.includes('-')) { const [s,e] = dow.split('-').map(Number); if (wd < s || wd > e) return false; } else if (parseInt(dow) !== wd) return false; }
      return true;
    }
    function getSchedulesForDate(date) {
      return D.schedules.filter(s => s.cron === '* * * * *' ? false : matchesCron(s.cron, date));

      recs.forEach(r => { const lvl = r.level || 'project'; if (!grouped[lvl]) grouped[lvl] = []; grouped[lvl].push(r); });
      let html = '';
      levelOrder.forEach(lvl => {
        const items = grouped[lvl];
        if (!items || items.length === 0) return;
        const critCount = items.filter(r => r.priority === 'Critical').length;
        const highCount = items.filter(r => r.priority === 'High').length;
        html += `<div class="mb-2">`;
        html += `<div class="flex items-center gap-3 py-2 px-3 bg-card/50 rounded-lg border border-border/50 cursor-pointer" onclick="document.getElementById('lvl-${lvl}').classList.toggle('hidden');this.querySelector('.lvl-arrow').textContent=document.getElementById('lvl-${lvl}').classList.contains('hidden')?'\u25B8':'\u25BE'" style="border-left:4px solid ${levelColors[lvl]}">`;
        html += `<span class="lvl-arrow text-slate-400">\u25BE</span>`;
        html += `<span class="text-sm font-semibold text-white">${levelIcons[lvl]} ${levelLabels[lvl]}</span>`;
        html += `<span class="text-xs text-slate-400">${items.length} rec${items.length>1?'s':''}</span>`;
        if (critCount) html += `<span class="text-xs px-1.5 py-0.5 rounded bg-red-900/50 text-red-300">${critCount} Critical</span>`;
        if (highCount) html += `<span class="text-xs px-1.5 py-0.5 rounded bg-amber-900/50 text-amber-300">${highCount} High</span>`;
        html += `</div>`;
        html += `<div id="lvl-${lvl}" class="space-y-2 mt-2 ml-2">`;
        if (lvl === 'department') {
          const byDept = {};
          items.forEach(r => { const key = r.department || r.project; if (!byDept[key]) byDept[key] = []; byDept[key].push(r); });
          Object.keys(byDept).forEach(deptKey => {
            html += `<div class="mb-1"><p class="text-xs text-slate-500 uppercase tracking-wider mb-1 ml-1">${deptKey}</p>`;
            byDept[deptKey].forEach(r => { html += renderRecCard(r, st, pendingRes); });
            html += `</div>`;
          });
        } else if (lvl === 'agent') {
          const byAgent = {};
          items.forEach(r => { const key = r.agentId || 'unknown'; if (!byAgent[key]) byAgent[key] = []; byAgent[key].push(r); });
          Object.keys(byAgent).forEach(agentKey => {
            html += `<div class="mb-1"><p class="text-xs text-slate-500 uppercase tracking-wider mb-1 ml-1">${agentKey}</p>`;
            byAgent[agentKey].forEach(r => { html += renderRecCard(r, st, pendingRes); });
            html += `</div>`;
          });
        } else {
          items.forEach(r => { html += renderRecCard(r, st, pendingRes); });
        }
        html += `</div></div>`;
      });
      if (html === '') html = '<p class="text-sm text-slate-500 text-center py-8">No recommendations match the current filters</p>';
      list.innerHTML = html;
    };

    // ==================== AGENTS TAB ====================
    function findAgent(agentId) {
      for (const dept of D.agents.departments) {
        const a = dept.agents.find(x => x.id === agentId);
        if (a) return { agent: a, dept };
      }
      return null;
    }

    function renderAgents(c) {
      // Sub-tab routing
      if (agentState.dept) { renderDeptDetail(c, agentState.dept); return; }
      if (agentState.product) { renderProductDetail(c, agentState.product); return; }
      if (agentState.client) { renderClientDetail(c, agentState.client); return; }

      // Header + sub-tabs
      c.innerHTML += `<div class="mb-4"><h2 class="text-lg font-semibold text-white">Agent Registry</h2><p class="text-sm text-slate-400">Organizational hierarchy — departments own capabilities, products compose them, clients consume them</p></div>`;
      const tabs = el('div','flex gap-6 border-b border-border mb-4');
      tabs.innerHTML = `<button class="agent-subtab pb-2 text-sm font-medium border-b-2 ${agentState.subTab==='departments'?'active text-white border-blue-400':'text-slate-400 border-transparent hover:text-white'}" onclick="agentState.subTab='departments';agentState.dept=null;agentState.product=null;agentState.client=null;render()">Departments</button><button class="agent-subtab pb-2 text-sm font-medium border-b-2 ${agentState.subTab==='products'?'active text-white border-blue-400':'text-slate-400 border-transparent hover:text-white'}" onclick="agentState.subTab='products';agentState.dept=null;agentState.product=null;agentState.client=null;render()">Products / Platforms</button><button class="agent-subtab pb-2 text-sm font-medium border-b-2 ${agentState.subTab==='clients'?'active text-white border-green-400':'text-slate-400 border-transparent hover:text-white'}" onclick="agentState.subTab='clients';agentState.dept=null;agentState.product=null;agentState.client=null;render()">Client Projects</button>`;
      c.appendChild(tabs);

      if (agentState.subTab === 'departments') renderDeptGrid(c);
      else if (agentState.subTab === 'products') renderProductGrid(c);
      else renderClientGrid(c);
    }

    function renderDeptGrid(c) {
      const ta = D.agents.departments.reduce((s,d)=>s+d.agentCount,0);
      const la = D.agents.departments.reduce((s,d)=>s+d.liveCount,0);
      // Summary row
      const ss = el('div','grid grid-cols-3 gap-4 mb-4');
      ss.innerHTML = `<div class="bg-card rounded-xl border border-border p-3 text-center"><p class="text-xs text-slate-400">Total Agents</p><p class="text-2xl font-bold text-white">${ta}</p></div><div class="bg-card rounded-xl border border-border p-3 text-center"><p class="text-xs text-slate-400">Live</p><p class="text-2xl font-bold text-green-400">${la}</p></div><div class="bg-card rounded-xl border border-border p-3 text-center"><p class="text-xs text-slate-400">Departments</p><p class="text-2xl font-bold text-blue-400">${D.agents.departments.length}</p></div>`;
      c.appendChild(ss);
      // Department cards — 2x3 grid
      const grid = el('div','grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4');
      D.agents.departments.forEach((dept,i) => {
        const d = el('div','bg-card rounded-xl border border-border p-5 animate-in clickable-card');
        d.style.borderLeftColor = dept.color; d.style.borderLeftWidth = '3px';
        d.style.animationDelay = `${i*0.08}s`;
        d.onclick = () => { agentState.dept = dept.id; agentState._deptProcIdx = 0; render(); };
        const pct = dept.agentCount > 0 ? dept.overallCompleteness : 0;
        const r = 30, circ = 2 * Math.PI * r, offset = circ - (pct / 100) * circ;
        const procCount = (dept.processes||[]).length;
        d.innerHTML = `<div class="flex items-center gap-4"><svg width="76" height="76" class="shrink-0"><circle class="gauge-bg" cx="38" cy="38" r="${r}"/><circle class="gauge-fill" cx="38" cy="38" r="${r}" stroke="${dept.color}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" transform="rotate(-90 38 38)"/><text x="38" y="35" text-anchor="middle" fill="#e2e8f0" font-size="20">${dept.icon}</text><text x="38" y="52" text-anchor="middle" fill="#94a3b8" font-size="10">${pct}%</text></svg><div class="flex-1"><h3 class="font-semibold text-white">${dept.name}</h3><p class="text-xs text-slate-400 mt-1">${dept.liveCount}/${dept.agentCount} agents \u00B7 ${procCount} process steps</p>${dept.framework?`<p class="text-xs text-slate-500 mt-0.5">${dept.framework.split('(')[0].trim()}</p>`:''}<p class="text-xs mt-1 ${dept.status==='active'?'text-green-400':dept.status==='planned'?'text-blue-400':'text-slate-500'}">${dept.status}</p></div><span class="text-slate-500">\u2192</span></div>`;
        grid.appendChild(d);
      });
      c.appendChild(grid);
    }

    function renderDeptDetail(c, deptId) {
      const dept = D.agents.departments.find(d=>d.id===deptId);
      if (!dept) { agentState.dept = null; render(); return; }
      const processes = dept.processes || [];

      // Header with back button, framework badge
      const hdr = el('div','flex items-center gap-4 animate-in mb-4');
      hdr.innerHTML = `<span class="back-btn text-slate-400 text-xl" onclick="agentState.dept=null;render()">\u2190</span><span class="text-2xl">${dept.icon}</span><div><h2 class="text-lg font-semibold text-white">${dept.name}</h2><p class="text-xs text-slate-400">${dept.liveCount}/${dept.agentCount} agents live \u00B7 ${dept.overallCompleteness}% complete</p>${dept.framework?`<p class="text-xs text-slate-500 mt-1">Framework: <span class="text-slate-300">${dept.framework}</span></p>`:''}</div>`;
      c.appendChild(hdr);

      if (dept.agents.length === 0 && processes.length === 0) { c.innerHTML += '<div class="bg-card rounded-xl border border-border p-6 text-center text-slate-500"><p class="text-lg mb-2">No agents defined yet</p><p class="text-sm">This department is in the planning/research phase.</p></div>'; return; }

      // If no processes defined, fall back to tier grouping
      if (!processes.length) {
        const tierNames = { 1: 'Competence Agents \u2014 Live / Core', 2: 'Next Build', 3: 'Strategic' };
        [1,2,3].forEach(tier => {
          const agents = dept.agents.filter(a=>a.tier===tier);
          if (!agents.length) return;
          c.appendChild(el('h3','text-xs font-semibold text-slate-500 uppercase tracking-wider mt-4 mb-2',tierNames[tier]));
          agents.forEach((a,i) => renderAgentCard(c, a, dept, i));
        });
        return;
      }

      // === PIPELINE VISUALIZATION (same pattern as products) ===
      if (agentState._deptProcIdx === undefined || agentState._deptProcIdx >= processes.length) agentState._deptProcIdx = 0;

      // Pipeline chevron header
      const pipeline = el('div','pipeline mb-1 animate-in');
      processes.forEach((proc,pi) => {
        const agents = (proc.agents||[]).map(id => findAgent(id)).filter(Boolean);
        const liveCount = agents.filter(f => f.agent.status === 'live' || f.agent.status === 'active').length;
        const totalCount = agents.length;
        const allLive = totalCount > 0 && liveCount === totalCount;
        const someLive = liveCount > 0;
        const bgColor = allLive ? '#14532d' : someLive ? '#1e3a5f' : '#1e293b';
        const stage = el('div','pipeline-stage');
        stage.style.background = bgColor;
        if (pi === agentState._deptProcIdx) stage.classList.add('stage-active');
        stage.onclick = () => { agentState._deptProcIdx = pi; render(); };
        stage.innerHTML = `<span class="stage-num">${pi+1}</span>${proc.name}<span class="stage-agents">${totalCount > 0 ? liveCount+'/'+totalCount+' agents' : 'no agents'}</span>`;
        pipeline.appendChild(stage);
      });
      c.appendChild(pipeline);

      // === PROCESS DETAIL PANEL ===
      const proc = processes[agentState._deptProcIdx];
      const detail = el('div','process-detail bg-card rounded-b-xl border border-border border-t-0 p-5 mb-4 animate-in');

      let detailHTML = `<div class="flex items-center justify-between mb-3"><div><h3 class="text-base font-semibold text-white">${proc.name}</h3>${proc.description?`<p class="text-xs text-slate-400 mt-1">${proc.description}</p>`:''}</div><div class="text-right"><span class="text-xs text-slate-500">Step ${agentState._deptProcIdx+1} of ${processes.length}</span></div></div>`;

      const agents = (proc.agents||[]).map(id => findAgent(id)).filter(Boolean);
      if (agents.length) {
        detailHTML += '<div class="grid grid-cols-1 md:grid-cols-2 gap-3">';
        agents.forEach(found => {
          const a = found.agent;
          const adept = found.dept;
          const color = adept ? adept.color : '#64748b';
          const stDot = a.status==='live'?'#22c55e':a.status==='active'?'#3b82f6':'#64748b';
          const stLabel = a.status==='live'?'text-green-400':a.status==='active'?'text-blue-400':'text-slate-500';
          const qPct = a.qualityScore||0;
          const cPct = a.capabilityScore||0;
          // Show cross-dept badge if agent belongs to a different dept
          const crossDept = adept && adept.id !== deptId;
          detailHTML += `<div class="agent-process-card bg-slate-800/50 rounded-xl border border-border p-4" style="border-left:3px solid ${color}">
            <div class="flex items-center gap-2 mb-2">
              <span style="width:8px;height:8px;border-radius:50%;background:${stDot}" class="inline-block shrink-0"></span>
              <span class="text-sm font-semibold text-white">${a.name}</span>
              <span class="tier-badge tier-${a.tier}">T${a.tier}</span>
              <span class="text-xs ${stLabel} ml-auto uppercase font-semibold">${a.status}</span>
            </div>
            <p class="text-xs text-slate-400 mb-3">${a.description}</p>
            ${crossDept?`<div class="flex items-center gap-2 mb-2"><span class="dept-chip" style="background:${color}22;color:${color};border:1px solid ${color}44">${adept.icon} ${adept.name}</span><span class="text-xs text-slate-500">cross-department</span></div>`:''}
            <div class="grid grid-cols-2 gap-3 mb-2">
              <div><p class="text-xs text-slate-500 mb-0.5">Quality</p><div class="flex items-center gap-2"><div class="flex-1 bg-slate-700 rounded-full h-1.5"><div class="${barColor(qPct)} h-1.5 rounded-full" style="width:${qPct}%"></div></div><span class="text-xs text-white">${a.qualityScore!==null?a.qualityScore+'/100':'N/A'}</span></div></div>
              <div><p class="text-xs text-slate-500 mb-0.5">Capability</p><div class="flex items-center gap-2"><div class="flex-1 bg-slate-700 rounded-full h-1.5"><div class="${barColor(cPct)} h-1.5 rounded-full" style="width:${cPct}%"></div></div><span class="text-xs text-white">${cPct}%</span></div></div>
            </div>
            ${a.tools.length?`<div class="flex flex-wrap gap-1"><p class="text-xs text-slate-500 w-full mb-1">Tools</p>${a.tools.map(t=>`<span class="text-xs bg-slate-900 text-slate-300 px-2 py-0.5 rounded">${t}</span>`).join('')}</div>`:''}
            ${a.subAgents.length?`<div class="mt-2 pt-2 border-t border-border/30"><p class="text-xs text-slate-500 mb-1">Sub-agents (${a.subAgents.length})</p>${a.subAgents.map(sa=>`<div class="sub-agent py-0.5"><span class="text-xs text-slate-300">${sa.name}</span> <span class="text-xs px-1.5 py-0.5 rounded ${sa.status==='live'?'bg-green-900/50 text-green-300':'bg-slate-800 text-slate-400'}">${sa.status}</span></div>`).join('')}</div>`:''}
          </div>`;
        });
        detailHTML += '</div>';
      } else {
        detailHTML += '<div class="bg-slate-800/30 rounded-lg p-4 text-center"><p class="text-sm text-slate-500">No agents assigned to this process step yet</p><p class="text-xs text-slate-600 mt-1">This stage is waiting for agent development</p></div>';
      }

      // Navigation
      const prevIdx = agentState._deptProcIdx > 0 ? agentState._deptProcIdx - 1 : null;
      const nextIdx = agentState._deptProcIdx < processes.length - 1 ? agentState._deptProcIdx + 1 : null;
      detailHTML += '<div class="flex justify-between mt-4 pt-3 border-t border-border/30">';
      detailHTML += prevIdx !== null ? `<button class="text-xs text-slate-400 hover:text-white transition-colors" onclick="agentState._deptProcIdx=${prevIdx};render()">\u2190 ${processes[prevIdx].name}</button>` : '<span></span>';
      detailHTML += nextIdx !== null ? `<button class="text-xs text-slate-400 hover:text-white transition-colors" onclick="agentState._deptProcIdx=${nextIdx};render()">${processes[nextIdx].name} \u2192</button>` : '<span></span>';
      detailHTML += '</div>';

      detail.innerHTML = detailHTML;
      c.appendChild(detail);

      // === PROCESS SUMMARY GRID ===
      c.appendChild(el('h3','text-xs font-semibold text-slate-500 uppercase tracking-wider mt-2 mb-3','All Process Steps'));
      const summaryGrid = el('div','grid grid-cols-2 md:grid-cols-3 gap-3');
      processes.forEach((proc,pi) => {
        const isActive = pi === agentState._deptProcIdx;
        const card = el('div',`bg-card rounded-xl border p-3 cursor-pointer transition-colors ${isActive?'border-blue-500':'border-border hover:border-slate-500'}`);
        card.onclick = () => { agentState._deptProcIdx = pi; render(); };
        const procAgents = (proc.agents||[]).map(id => findAgent(id)).filter(Boolean);
        const agentDots = procAgents.map(f => {
          const stBg = f.agent.status==='live'?'#22c55e':f.agent.status==='active'?'#3b82f6':'#64748b';
          return `<span title="${f.agent.name}" style="width:10px;height:10px;border-radius:50%;background:${dept.color};border:2px solid ${stBg};display:inline-block"></span>`;
        }).join('');
        const emptyDots = procAgents.length === 0 ? '<span class="text-xs text-slate-600">no agents</span>' : '';
        card.innerHTML = `<div class="flex items-center gap-2 mb-1"><span class="text-xs text-slate-500">Step ${pi+1}</span>${isActive?'<span class="text-xs text-blue-400">\u25CF</span>':''}</div><p class="text-sm font-medium text-white mb-1">${proc.name}</p><div class="flex gap-1.5">${agentDots}${emptyDots}</div>`;
        summaryGrid.appendChild(card);
      });
      c.appendChild(summaryGrid);

      // === FULL AGENT ROSTER (tier grouped, below pipeline) ===
      if (dept.agents.length > 0) {
        c.appendChild(el('h3','text-xs font-semibold text-slate-500 uppercase tracking-wider mt-6 mb-3','All Department Agents'));
        const tierNames = { 1: 'Core / Live', 2: 'Next Build', 3: 'Strategic' };
        [1,2,3].forEach(tier => {
          const tierAgents = dept.agents.filter(a=>a.tier===tier);
          if (!tierAgents.length) return;
          c.appendChild(el('h4','text-xs text-slate-600 mb-1 mt-2',tierNames[tier]));
          tierAgents.forEach((a,i) => renderAgentCard(c, a, dept, i));
        });
      }
    }

    function renderAgentCard(c, a, dept, i) {
      const card = el('div','bg-card rounded-xl border border-border p-4 mb-2 animate-in');
      card.style.borderLeftColor = dept.color; card.style.borderLeftWidth = '3px';
      card.style.animationDelay = `${i*0.05}s`;
      const stColor = a.status==='live'?'bg-green-900 text-green-300':a.status==='active'?'bg-blue-900 text-blue-300':'bg-slate-800 text-slate-400';
      const qPct = a.qualityScore || 0; const cPct = a.capabilityScore || 0;
      card.innerHTML = `<div class="flex items-center justify-between cursor-pointer" onclick="toggleAgentDetail('${a.id}')"><div class="flex items-center gap-3"><span class="tier-badge tier-${a.tier}">T${a.tier}</span><span class="font-medium text-white text-sm">${a.name}</span><span class="text-xs px-2 py-0.5 rounded-full ${stColor}">${a.status}</span></div><div class="flex items-center gap-4"><div class="w-24 hidden sm:block"><p class="text-xs text-slate-500 mb-0.5">Quality</p><div class="w-full bg-slate-700 rounded-full h-1"><div class="${barColor(qPct)} h-1 rounded-full" style="width:${qPct}%"></div></div></div><div class="w-24 hidden sm:block"><p class="text-xs text-slate-500 mb-0.5">Capability</p><div class="w-full bg-slate-700 rounded-full h-1"><div class="${barColor(cPct)} h-1 rounded-full" style="width:${cPct}%"></div></div></div><span class="text-slate-500 text-xs">\u25BC</span></div></div><div id="ad-${a.id}" class="expandable-content"><div class="mt-3 pt-3 border-t border-border/50"><p class="text-sm text-slate-300 mb-3">${a.description}</p><div class="grid grid-cols-2 gap-4 mb-3"><div><p class="text-xs text-slate-500 mb-1">Quality Score</p><div class="flex items-center gap-2"><div class="flex-1 bg-slate-700 rounded-full h-2"><div class="${barColor(qPct)} h-2 rounded-full" style="width:${qPct}%"></div></div><span class="text-sm font-bold text-white">${a.qualityScore !== null ? a.qualityScore + '/100' : 'N/A'}</span></div></div><div><p class="text-xs text-slate-500 mb-1">Capability vs Industry</p><div class="flex items-center gap-2"><div class="flex-1 bg-slate-700 rounded-full h-2"><div class="${barColor(cPct)} h-2 rounded-full" style="width:${cPct}%"></div></div><span class="text-sm font-bold text-white">${cPct}%</span></div></div></div>${a.tools.length?`<p class="text-xs text-slate-500 mb-1">Tools</p><div class="flex flex-wrap gap-1 mb-3">${a.tools.map(t=>`<span class="text-xs bg-slate-800 text-slate-300 px-2 py-0.5 rounded">${t}</span>`).join('')}</div>`:''}${a.benchmarks.length?`<p class="text-xs text-slate-500 mb-1">Industry Benchmarks</p><div class="overflow-x-auto"><table class="w-full text-xs mb-2"><thead><tr class="text-slate-500"><th class="text-left py-1 pr-3">Competitor</th><th class="text-left py-1 pr-3">Capability</th><th class="text-right py-1">Coverage</th></tr></thead><tbody>${a.benchmarks.map(b=>`<tr class="border-t border-border/30"><td class="py-1 pr-3 text-slate-300">${b.competitor}</td><td class="py-1 pr-3 text-slate-400">${b.capability}</td><td class="py-1 text-right"><span class="font-bold ${b.ourCoverage>=80?'text-green-400':b.ourCoverage>=50?'text-amber-400':b.ourCoverage>0?'text-red-400':'text-slate-500'}">${b.ourCoverage}%</span></td></tr>`).join('')}</tbody></table></div>`:''}</div>${a.subAgents.length?`<div class="mt-2"><p class="text-xs text-slate-500 mb-1">Skill / Worker Agents (${a.subAgents.length})</p>${a.subAgents.map(sa=>`<div class="sub-agent py-1"><span class="text-xs text-slate-300">${sa.name}</span> <span class="text-xs px-1.5 py-0.5 rounded ${sa.status==='live'?'bg-green-900 text-green-300':'bg-slate-800 text-slate-400'}">${sa.status}</span></div>`).join('')}</div>`:''}</div>`;
      c.appendChild(card);
    }

    function renderProductGrid(c) {
      const products = D.agents.products || [];
      // Summary
      const activeP = products.filter(p=>p.status==='active').length;
      const totalProcesses = products.reduce((s,p)=>s+(p.processes||[]).length,0);
      const ss = el('div','grid grid-cols-3 gap-4 mb-4');
      ss.innerHTML = `<div class="bg-card rounded-xl border border-border p-3 text-center"><p class="text-xs text-slate-400">Products / Platforms</p><p class="text-2xl font-bold text-white">${products.length}</p></div><div class="bg-card rounded-xl border border-border p-3 text-center"><p class="text-xs text-slate-400">Active</p><p class="text-2xl font-bold text-green-400">${activeP}</p></div><div class="bg-card rounded-xl border border-border p-3 text-center"><p class="text-xs text-slate-400">Total Processes</p><p class="text-2xl font-bold text-blue-400">${totalProcesses}</p></div>`;
      c.appendChild(ss);
      const grid = el('div','grid grid-cols-1 md:grid-cols-2 gap-4');
      products.forEach((prod,i) => {
        const d = el('div','bg-card rounded-xl border border-border p-5 animate-in clickable-card');
        d.style.animationDelay = `${i*0.1}s`;
        d.onclick = () => { agentState.product = prod.id; render(); };
        const stColor = prod.status==='active'?'text-green-400':prod.status==='research'?'text-blue-400':prod.status==='planned'?'text-amber-400':'text-slate-500';
        // Count unique agents and departments
        const agentIds = new Set(); const deptIds = new Set();
        (prod.processes||[]).forEach(pr => (pr.agents||[]).forEach(a => { agentIds.add(a.agentId); deptIds.add(a.deptId); }));

    // ==================== BU DETAIL VIEW ====================
    function renderBUDetail(c, buId) {
      const bu = (D.agents.businessUnits||[]).find(b=>b.id===buId);
      if (!bu) { orgState.bu = null; render(); return; }
      const depts = D.agents.departments.filter(d=>d.buId===bu.id);
      const buAgentCount = depts.reduce((s,d)=>s+d.agentCount,0);
      const buLive = depts.reduce((s,d)=>s+d.liveCount,0);
      const pct = buAgentCount > 0 ? Math.round(depts.reduce((s,d)=>s+d.overallCompleteness,0)/depts.length) : 0;

      // Header
      const hdr = el('div','flex items-center gap-4 animate-in mb-2');

      c.appendChild(hdr);

      // KPIs
      const kpis = el('div','grid grid-cols-2 md:grid-cols-4 gap-3 mb-4');
      kpis.innerHTML = `
        <div class="bg-card rounded-xl border border-border p-3 org-kpi animate-in"><p class="text-xs text-slate-400">Departments</p><p class="text-2xl font-bold text-white">${depts.length}</p></div>
        <div class="bg-card rounded-xl border border-border p-3 org-kpi animate-in" style="animation-delay:0.05s"><p class="text-xs text-slate-400">Agents Live</p><p class="text-2xl font-bold text-green-400">${buLive}<span class="text-sm text-slate-500">/${buAgentCount}</span></p></div>
        <div class="bg-card rounded-xl border border-border p-3 org-kpi animate-in" style="animation-delay:0.1s"><p class="text-xs text-slate-400">Completeness</p><p class="text-2xl font-bold" style="color:${bu.color}">${pct}%</p></div>
        <div class="bg-card rounded-xl border border-border p-3 org-kpi animate-in" style="animation-delay:0.15s"><p class="text-xs text-slate-400">Process Steps</p><p class="text-2xl font-bold text-white">${processes.length}</p></div>`;
      c.appendChild(kpis);

      // === BU PIPELINE — chevron process flow ===
      if (processes.length) {
        if (orgState._buProcIdx === undefined || orgState._buProcIdx >= processes.length) orgState._buProcIdx = 0;

        const pipeline = el('div','pipeline mb-1 animate-in');
        processes.forEach((proc,pi) => {
          const agents = (proc.agents||[]).map(id => findAgent(id)).filter(Boolean);
          const liveCount = agents.filter(f => f.agent.status === 'live' || f.agent.status === 'active').length;
          const totalCount = agents.length;
          const hasDepts = (proc.deptIds||[]).length > 0;
          const allLive = totalCount > 0 && liveCount === totalCount;
          const someLive = liveCount > 0;
          const bgColor = allLive ? '#14532d' : someLive ? '#1e3a5f' : hasDepts ? '#1e293b' : '#111827';
          const stage = el('div','pipeline-stage');
          stage.style.background = bgColor;
          if (pi === orgState._buProcIdx) stage.classList.add('stage-active');
          stage.onclick = () => { orgState._buProcIdx = pi; render(); };

          pipeline.appendChild(stage);
        });
        c.appendChild(pipeline);

        // === PROCESS DETAIL PANEL ===

            const adept = found.dept;
            const color = adept ? adept.color : '#64748b';
            const stDot = a.status==='live'?'#22c55e':a.status==='active'?'#3b82f6':'#64748b';
            const stLabel = a.status==='live'?'text-green-400':a.status==='active'?'text-blue-400':'text-slate-500';
            const qPct = a.qualityScore||0;
            const cPct = a.capabilityScore||0;
            detailHTML += `<div class="agent-process-card bg-slate-800/50 rounded-xl border border-border p-4" style="border-left:3px solid ${color}">
              <div class="flex items-center gap-2 mb-2">
                <span style="width:8px;height:8px;border-radius:50%;background:${stDot}" class="inline-block shrink-0"></span>
                <span class="text-sm font-semibold text-white">${a.name}</span>
                <span class="tier-badge tier-${a.tier}">T${a.tier}</span>
                <span class="text-xs ${stLabel} ml-auto uppercase font-semibold">${a.status}</span>
              </div>
              <p class="text-xs text-slate-400 mb-2">${a.description}</p>
              <div class="flex items-center gap-2 mb-2">
                <span class="dept-chip" style="background:${color}22;color:${color};border:1px solid ${color}44">${adept?adept.icon+' '+adept.name:''}</span>
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div><p class="text-xs text-slate-500 mb-0.5">Quality</p><div class="flex items-center gap-2"><div class="flex-1 bg-slate-700 rounded-full h-1.5"><div class="${barColor(qPct)} h-1.5 rounded-full" style="width:${qPct}%"></div></div><span class="text-xs text-white">${a.qualityScore!==null?a.qualityScore+'/100':'N/A'}</span></div></div>
                <div><p class="text-xs text-slate-500 mb-0.5">Capability</p><div class="flex items-center gap-2"><div class="flex-1 bg-slate-700 rounded-full h-1.5"><div class="${barColor(cPct)} h-1.5 rounded-full" style="width:${cPct}%"></div></div><span class="text-xs text-white">${cPct}%</span></div></div>
              </div>
            </div>`;
          });
          detailHTML += '</div>';
        } else if (procDepts.length) {
          detailHTML += '<div class="bg-slate-800/30 rounded-lg p-4 text-center"><p class="text-sm text-slate-500">No agents assigned to this process step yet</p><p class="text-xs text-slate-600 mt-1">Departments are mapped but agents are awaiting development</p></div>';
        } else {
          detailHTML += '<div class="bg-slate-800/30 rounded-lg p-4 text-center"><p class="text-sm text-slate-500">External handoff stage</p><p class="text-xs text-slate-600 mt-1">This stage is handled outside this business unit</p></div>';
        }

        // Navigation
        const prevIdx = orgState._buProcIdx > 0 ? orgState._buProcIdx - 1 : null;
        const nextIdx = orgState._buProcIdx < processes.length - 1 ? orgState._buProcIdx + 1 : null;
        detailHTML += '<div class="flex justify-between mt-4 pt-3 border-t border-border/30">';
        detailHTML += prevIdx !== null ? `<button class="text-xs text-slate-400 hover:text-white transition-colors" onclick="orgState._buProcIdx=${prevIdx};render()">\u2190 ${processes[prevIdx].name}</button>` : '<span></span>';
        detailHTML += nextIdx !== null ? `<button class="text-xs text-slate-400 hover:text-white transition-colors" onclick="orgState._buProcIdx=${nextIdx};render()">${processes[nextIdx].name} \u2192</button>` : '<span></span>';
        detailHTML += '</div>';

        detail.innerHTML = detailHTML;
        c.appendChild(detail);

        // Summary grid
        c.appendChild(el('h3','text-xs font-semibold text-slate-500 uppercase tracking-wider mt-2 mb-3','All Process Steps'));
        const summaryGrid = el('div','grid grid-cols-2 md:grid-cols-3 gap-3');
        processes.forEach((proc,pi) => {
          const isActive = pi === orgState._buProcIdx;
          const card = el('div',`bg-card rounded-xl border p-3 cursor-pointer transition-colors ${isActive?'border-blue-500':'border-border hover:border-slate-500'}`);
          card.onclick = () => { orgState._buProcIdx = pi; render(); };
          const procAgents = (proc.agents||[]).map(id => findAgent(id)).filter(Boolean);
          const procDeptsSmall = (proc.deptIds||[]).map(did => D.agents.departments.find(d=>d.id===did)).filter(Boolean);
          const deptDots = procDeptsSmall.map(d => `<span title="${d.name}" style="width:10px;height:10px;border-radius:50%;background:${d.color};display:inline-block"></span>`).join('');
          const agentDots = procAgents.map(f => {
            const stBg = f.agent.status==='live'?'#22c55e':f.agent.status==='active'?'#3b82f6':'#64748b';
            return `<span title="${f.agent.name}" style="width:8px;height:8px;border-radius:50%;background:${f.dept.color};border:2px solid ${stBg};display:inline-block"></span>`;
          }).join('');
          card.innerHTML = `<div class="flex items-center gap-2 mb-1"><span class="text-xs text-slate-500">Step ${pi+1}</span>${isActive?'<span class="text-xs text-blue-400">\u25CF</span>':''}</div><p class="text-sm font-medium text-white mb-1">${proc.name}</p><div class="flex gap-1.5 items-center">${deptDots}${agentDots ? '<span class="text-slate-600 text-xs mx-1">\u00B7</span>'+agentDots : ''}</div>`;
          summaryGrid.appendChild(card);
        });
        c.appendChild(summaryGrid);
      }

      // === DEPARTMENTS (below pipeline) ===
      c.appendChild(el('h3','text-sm font-semibold text-slate-400 uppercase tracking-wider mt-6 mb-3','Departments'));
      depts.forEach((dept,i) => {
        const dCard = el('div','bg-card rounded-xl border border-border p-5 mb-3 animate-in clickable-card');
        dCard.style.borderLeftColor = dept.color; dCard.style.borderLeftWidth = '3px';
        dCard.style.animationDelay = `${i*0.08}s`;
        dCard.onclick = () => { orgState.dept = dept.id; orgState._orgDeptProcIdx = 0; render(); };
        const dPct = dept.overallCompleteness || 0;
        const r = 26, circ = 2 * Math.PI * r, offset = circ - (dPct / 100) * circ;
        const live = dept.agents.filter(a=>a.status==='live').length;
        const planned = dept.agents.filter(a=>a.status==='planned').length;
        const active = dept.agents.filter(a=>a.status==='active').length;
        const procCount = (dept.processes||[]).length;
        dCard.innerHTML = `<div class="flex items-center gap-4"><svg width="64" height="64" class="shrink-0"><circle class="gauge-bg" cx="32" cy="32" r="${r}"/><circle class="gauge-fill" cx="32" cy="32" r="${r}" stroke="${dept.color}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" transform="rotate(-90 32 32)"/><text x="32" y="29" text-anchor="middle" fill="#e2e8f0" font-size="16">${dept.icon}</text><text x="32" y="44" text-anchor="middle" fill="#94a3b8" font-size="9">${dPct}%</text></svg><div class="flex-1"><h4 class="font-semibold text-white">${dept.name}</h4><p class="text-xs text-slate-400 mt-1">${dept.liveCount}/${dept.agentCount} agents \u00B7 ${procCount} process steps</p>${dept.framework?`<p class="text-xs text-slate-500 mt-0.5">${dept.framework.split('(')[0].trim()}</p>`:''}<div class="flex gap-3 mt-2">${live?`<span class="text-xs text-green-400">${live} live</span>`:''}${active?`<span class="text-xs text-blue-400">${active} building</span>`:''}${planned?`<span class="text-xs text-slate-500">${planned} planned</span>`:''}</div></div><span class="text-slate-500">\u2192</span></div>`;
        c.appendChild(dCard);
      });

      // Cross-references
      const buAgentIds = new Set();
      depts.forEach(d => d.agents.forEach(a => buAgentIds.add(a.id)));
      const relatedProducts = (D.agents.products||[]).filter(p => (p.processes||[]).some(pr => (pr.agents||[]).some(ref => buAgentIds.has(ref.agentId))));
      if (relatedProducts.length) {
        c.appendChild(el('h3','text-sm font-semibold text-slate-400 uppercase tracking-wider mt-6 mb-3','Products using this BU\u2019s agents'));
        const pGrid = el('div','grid grid-cols-1 md:grid-cols-2 gap-3');
        relatedProducts.forEach(prod => {
          const borrowed = new Set();
          (prod.processes||[]).forEach(pr => (pr.agents||[]).forEach(ref => { if (buAgentIds.has(ref.agentId)) borrowed.add(ref.agentId); }));
          const stColor = prod.status==='active'?'text-green-400':prod.status==='research'?'text-blue-400':'text-slate-500';
          pGrid.innerHTML += `<div class="bg-card rounded-xl border border-border p-4 cursor-pointer hover:border-blue-500 transition-colors" onclick="navigateTo('agents');agentState.subTab='products';agentState.product='${prod.id}';render()"><div class="flex items-center gap-2 mb-1"><span class="text-sm font-semibold text-white">${prod.name}</span><span class="text-xs ${stColor} uppercase">${prod.status}</span></div><p class="text-xs text-slate-400">Borrows ${borrowed.size} agent${borrowed.size!==1?'s':''} from this BU</p></div>`;
        });
        c.appendChild(pGrid);
      }
      const relatedClients = (D.agents.clientProjects||[]).filter(cp => (cp.services||[]).some(svc => (svc.agents||[]).some(ref => buAgentIds.has(ref.agentId))));
      if (relatedClients.length) {
        c.appendChild(el('h3','text-sm font-semibold text-slate-400 uppercase tracking-wider mt-6 mb-3','Clients served by this BU'));
        const cGrid = el('div','grid grid-cols-1 md:grid-cols-2 gap-3');
        relatedClients.forEach(client => {
          const svcCount = (client.services||[]).filter(svc => (svc.agents||[]).some(ref => buAgentIds.has(ref.agentId))).length;
          const stColor = client.status==='active'?'text-green-400':'text-slate-500';
          cGrid.innerHTML += `<div class="bg-card rounded-xl border border-border p-4 cursor-pointer hover:border-green-500 transition-colors" onclick="navigateTo('agents');agentState.subTab='clients';agentState.client='${client.id}';render()"><div class="flex items-center gap-2 mb-1"><span class="text-sm font-semibold text-white">${client.name}</span><span class="text-xs ${stColor} uppercase">${client.status}</span><span class="text-xs text-slate-500">${client.code}</span></div><p class="text-xs text-slate-400">${svcCount} service${svcCount!==1?'s':''} using agents from this BU</p></div>`;
        });
        c.appendChild(cGrid);
      }
    }

    // ==================== ORG DEPT DETAIL (within Organisation tab) ====================
    function renderOrgDeptDetail(c, deptId) {
      const dept = D.agents.departments.find(d=>d.id===deptId);
      if (!dept) { orgState.dept = null; render(); return; }
      const bu = (D.agents.businessUnits||[]).find(b=>b.id===dept.buId);
      const processes = dept.processes || [];

      // Header with breadcrumb
      const hdr = el('div','flex items-center gap-3 animate-in mb-2');
      hdr.innerHTML = `<span class="back-btn text-slate-400 text-xl" onclick="orgState.dept=null;render()">\u2190</span><span class="text-2xl">${dept.icon}</span><div class="flex-1"><h2 class="text-lg font-semibold text-white">${dept.name}</h2><p class="text-xs text-slate-400">${bu?bu.icon+' '+bu.name+' \u00B7 ':''} ${dept.liveCount}/${dept.agentCount} agents live \u00B7 ${dept.overallCompleteness}% complete</p>${dept.framework?`<p class="text-xs text-slate-500 mt-1">Framework: <span class="text-slate-300">${dept.framework}</span></p>`:''}</div>`;
      c.appendChild(hdr);

      if (dept.agents.length === 0 && processes.length === 0) {
        c.innerHTML += '<div class="bg-card rounded-xl border border-border p-6 text-center text-slate-500 mt-4"><p class="text-lg mb-2">No agents defined yet</p><p class="text-sm">This department is in the planning/research phase.</p></div>';
        return;
      }

      // === PIPELINE (if processes exist) ===
      if (processes.length) {
        if (orgState._orgDeptProcIdx === undefined || orgState._orgDeptProcIdx >= processes.length) orgState._orgDeptProcIdx = 0;

        const pipeline = el('div','pipeline mb-1 animate-in');
        processes.forEach((proc,pi) => {
          const agents = (proc.agents||[]).map(id => findAgent(id)).filter(Boolean);
          const liveCount = agents.filter(f => f.agent.status === 'live' || f.agent.status === 'active').length;
          const totalCount = agents.length;
          const allLive = totalCount > 0 && liveCount === totalCount;
          const someLive = liveCount > 0;
          const bgColor = allLive ? '#14532d' : someLive ? '#1e3a5f' : '#1e293b';
          const stage = el('div','pipeline-stage');
          stage.style.background = bgColor;
          if (pi === orgState._orgDeptProcIdx) stage.classList.add('stage-active');
          stage.onclick = () => { orgState._orgDeptProcIdx = pi; render(); };
          stage.innerHTML = `<span class="stage-num">${pi+1}</span>${proc.name}<span class="stage-agents">${totalCount > 0 ? liveCount+'/'+totalCount+' agents' : 'no agents'}</span>`;
          pipeline.appendChild(stage);
        });
        c.appendChild(pipeline);

        // Detail panel
        const proc = processes[orgState._orgDeptProcIdx];
        const detail = el('div','process-detail bg-card rounded-b-xl border border-border border-t-0 p-5 mb-4 animate-in');
        let detailHTML = `<div class="flex items-center justify-between mb-3"><div><h3 class="text-base font-semibold text-white">${proc.name}</h3>${proc.description?`<p class="text-xs text-slate-400 mt-1">${proc.description}</p>`:''}</div><div class="text-right"><span class="text-xs text-slate-500">Step ${orgState._orgDeptProcIdx+1} of ${processes.length}</span></div></div>`;

        const agents = (proc.agents||[]).map(id => findAgent(id)).filter(Boolean);
        if (agents.length) {
          detailHTML += '<div class="grid grid-cols-1 md:grid-cols-2 gap-3">';
          agents.forEach(found => {
            const a = found.agent;
            const adept = found.dept;
            const color = adept ? adept.color : '#64748b';
            const stDot = a.status==='live'?'#22c55e':a.status==='active'?'#3b82f6':'#64748b';
            const stLabel = a.status==='live'?'text-green-400':a.status==='active'?'text-blue-400':'text-slate-500';
            const qPct = a.qualityScore||0;
            const cPct = a.capabilityScore||0;
            const crossDept = adept && adept.id !== deptId;
            // Cross-refs
            const usedByProducts = (D.agents.products||[]).filter(p=>(p.processes||[]).some(pr=>(pr.agents||[]).some(ref=>ref.agentId===a.id)));
            const usedByClients = (D.agents.clientProjects||[]).filter(cp=>(cp.services||[]).some(svc=>(svc.agents||[]).some(ref=>ref.agentId===a.id)));
            let crossRefs = '';
            if (usedByProducts.length || usedByClients.length) {
              crossRefs = '<div class="mt-2 pt-2 border-t border-border/30"><p class="text-xs text-slate-500 mb-1">Used by</p><div class="flex flex-wrap gap-1">';
              usedByProducts.forEach(p => { crossRefs += `<span class="text-xs px-2 py-0.5 rounded bg-blue-900/30 text-blue-300">\u{1F4E6} ${p.name}</span>`; });
              usedByClients.forEach(cl => { crossRefs += `<span class="text-xs px-2 py-0.5 rounded bg-green-900/30 text-green-300">\u{1F91D} ${cl.name}</span>`; });
              crossRefs += '</div></div>';
            }
            detailHTML += `<div class="agent-process-card bg-slate-800/50 rounded-xl border border-border p-4" style="border-left:3px solid ${color}">
              <div class="flex items-center gap-2 mb-2">
                <span style="width:8px;height:8px;border-radius:50%;background:${stDot}" class="inline-block shrink-0"></span>
                <span class="text-sm font-semibold text-white">${a.name}</span>
                <span class="tier-badge tier-${a.tier}">T${a.tier}</span>
                <span class="text-xs ${stLabel} ml-auto uppercase font-semibold">${a.status}</span>
              </div>
              <p class="text-xs text-slate-400 mb-2">${a.description}</p>
              ${crossDept?`<div class="flex items-center gap-2 mb-2"><span class="dept-chip" style="background:${color}22;color:${color};border:1px solid ${color}44">${adept.icon} ${adept.name}</span><span class="text-xs text-slate-500">cross-department</span></div>`:''}
              <div class="grid grid-cols-2 gap-3 mb-2">
                <div><p class="text-xs text-slate-500 mb-0.5">Quality</p><div class="flex items-center gap-2"><div class="flex-1 bg-slate-700 rounded-full h-1.5"><div class="${barColor(qPct)} h-1.5 rounded-full" style="width:${qPct}%"></div></div><span class="text-xs text-white">${a.qualityScore!==null?a.qualityScore+'/100':'N/A'}</span></div></div>
                <div><p class="text-xs text-slate-500 mb-0.5">Capability</p><div class="flex items-center gap-2"><div class="flex-1 bg-slate-700 rounded-full h-1.5"><div class="${barColor(cPct)} h-1.5 rounded-full" style="width:${cPct}%"></div></div><span class="text-xs text-white">${cPct}%</span></div></div>
              </div>
              ${crossRefs}
            </div>`;
          });
          detailHTML += '</div>';
        } else {
          detailHTML += '<div class="bg-slate-800/30 rounded-lg p-4 text-center"><p class="text-sm text-slate-500">No agents assigned to this process step yet</p></div>';
        }

        // Navigation
        const prevIdx = orgState._orgDeptProcIdx > 0 ? orgState._orgDeptProcIdx - 1 : null;
        const nextIdx = orgState._orgDeptProcIdx < processes.length - 1 ? orgState._orgDeptProcIdx + 1 : null;
        detailHTML += '<div class="flex justify-between mt-4 pt-3 border-t border-border/30">';
        detailHTML += prevIdx !== null ? `<button class="text-xs text-slate-400 hover:text-white transition-colors" onclick="orgState._orgDeptProcIdx=${prevIdx};render()">\u2190 ${processes[prevIdx].name}</button>` : '<span></span>';
        detailHTML += nextIdx !== null ? `<button class="text-xs text-slate-400 hover:text-white transition-colors" onclick="orgState._orgDeptProcIdx=${nextIdx};render()">${processes[nextIdx].name} \u2192</button>` : '<span></span>';
        detailHTML += '</div>';

        detail.innerHTML = detailHTML;
        c.appendChild(detail);

        // Summary grid
        c.appendChild(el('h3','text-xs font-semibold text-slate-500 uppercase tracking-wider mt-2 mb-3','All Process Steps'));
        const summaryGrid = el('div','grid grid-cols-2 md:grid-cols-3 gap-3');
        processes.forEach((proc,pi) => {
          const isActive = pi === orgState._orgDeptProcIdx;
          const card = el('div',`bg-card rounded-xl border p-3 cursor-pointer transition-colors ${isActive?'border-blue-500':'border-border hover:border-slate-500'}`);
          card.onclick = () => { orgState._orgDeptProcIdx = pi; render(); };
          const procAgents = (proc.agents||[]).map(id => findAgent(id)).filter(Boolean);
          const agentDots = procAgents.map(f => {
            const stBg = f.agent.status==='live'?'#22c55e':f.agent.status==='active'?'#3b82f6':'#64748b';
            return `<span title="${f.agent.name}" style="width:10px;height:10px;border-radius:50%;background:${dept.color};border:2px solid ${stBg};display:inline-block"></span>`;
          }).join('');
          card.innerHTML = `<div class="flex items-center gap-2 mb-1"><span class="text-xs text-slate-500">Step ${pi+1}</span>${isActive?'<span class="text-xs text-blue-400">\u25CF</span>':''}</div><p class="text-sm font-medium text-white mb-1">${proc.name}</p><div class="flex gap-1.5">${agentDots || '<span class="text-xs text-slate-600">no agents</span>'}</div>`;
          summaryGrid.appendChild(card);
        });
        c.appendChild(summaryGrid);
      }

      // === FULL AGENT ROSTER (tier grouped, below pipeline) ===
      if (dept.agents.length > 0) {
        c.appendChild(el('h3','text-sm font-semibold text-slate-400 uppercase tracking-wider mt-6 mb-3','All Department Agents'));
        const tierNames = { 1: 'Live / Core Agents', 2: 'Next Build', 3: 'Strategic / Future' };
        [1,2,3].forEach(tier => {
          const agents = dept.agents.filter(a=>a.tier===tier);
          if (!agents.length) return;
          c.appendChild(el('h4','text-xs text-slate-600 mb-1 mt-2',tierNames[tier]));
          agents.forEach((a,i) => {
            const card = el('div','bg-card rounded-xl border border-border p-4 mb-2 animate-in');
            card.style.borderLeftColor = dept.color; card.style.borderLeftWidth = '3px';
            card.style.animationDelay = `${i*0.05}s`;
            const stColor = a.status==='live'?'bg-green-900 text-green-300':a.status==='active'?'bg-blue-900 text-blue-300':'bg-slate-800 text-slate-400';
            const qPct = a.qualityScore || 0; const cPct = a.capabilityScore || 0;
            const usedByProducts = (D.agents.products||[]).filter(p=>(p.processes||[]).some(pr=>(pr.agents||[]).some(ref=>ref.agentId===a.id)));
            const usedByClients = (D.agents.clientProjects||[]).filter(cp=>(cp.services||[]).some(svc=>(svc.agents||[]).some(ref=>ref.agentId===a.id)));
            let crossRefs = '';
            if (usedByProducts.length || usedByClients.length) {
              crossRefs = '<div class="mt-3 pt-2 border-t border-border/30"><p class="text-xs text-slate-500 mb-1">Used by</p><div class="flex flex-wrap gap-1">';
              usedByProducts.forEach(p => { crossRefs += `<span class="text-xs px-2 py-0.5 rounded bg-blue-900/30 text-blue-300">\u{1F4E6} ${p.name}</span>`; });
              usedByClients.forEach(cl => { crossRefs += `<span class="text-xs px-2 py-0.5 rounded bg-green-900/30 text-green-300">\u{1F91D} ${cl.name}</span>`; });
              crossRefs += '</div></div>';
            }
            card.innerHTML = `<div class="flex items-center justify-between cursor-pointer" onclick="toggleAgentDetail('org-${a.id}')"><div class="flex items-center gap-3"><span class="tier-badge tier-${a.tier}">T${a.tier}</span><span class="font-medium text-white text-sm">${a.name}</span><span class="text-xs px-2 py-0.5 rounded-full ${stColor}">${a.status}</span></div><div class="flex items-center gap-4"><div class="w-24 hidden sm:block"><p class="text-xs text-slate-500 mb-0.5">Quality</p><div class="w-full bg-slate-700 rounded-full h-1"><div class="${barColor(qPct)} h-1 rounded-full" style="width:${qPct}%"></div></div></div><div class="w-24 hidden sm:block"><p class="text-xs text-slate-500 mb-0.5">Capability</p><div class="w-full bg-slate-700 rounded-full h-1"><div class="${barColor(cPct)} h-1 rounded-full" style="width:${cPct}%"></div></div></div><span class="text-slate-500 text-xs">\u25BC</span></div></div><div id="ad-org-${a.id}" class="expandable-content"><div class="mt-3 pt-3 border-t border-border/50"><p class="text-sm text-slate-300 mb-3">${a.description}</p><div class="grid grid-cols-2 gap-4 mb-3"><div><p class="text-xs text-slate-500 mb-1">Quality Score</p><div class="flex items-center gap-2"><div class="flex-1 bg-slate-700 rounded-full h-2"><div class="${barColor(qPct)} h-2 rounded-full" style="width:${qPct}%"></div></div><span class="text-sm font-bold text-white">${a.qualityScore !== null ? a.qualityScore + '/100' : 'N/A'}</span></div></div><div><p class="text-xs text-slate-500 mb-1">Capability vs Industry</p><div class="flex items-center gap-2"><div class="flex-1 bg-slate-700 rounded-full h-2"><div class="${barColor(cPct)} h-2 rounded-full" style="width:${cPct}%"></div></div><span class="text-sm font-bold text-white">${cPct}%</span></div></div></div>${a.tools.length?`<p class="text-xs text-slate-500 mb-1">Tools</p><div class="flex flex-wrap gap-1 mb-3">${a.tools.map(t=>`<span class="text-xs bg-slate-800 text-slate-300 px-2 py-0.5 rounded">${t}</span>`)     // ==================== SHARED COMPONENTS ====================
    function el(tag, cls, txt) { const e = document.createElement(tag); if (cls) e.className = cls; if (txt) e.textContent = txt; return e; }
    function renderTasksTable(c, tasks, title) {

    // ==================== AGENT ARMY VIEW ====================
    function renderAgentArmy(c) {

      // === Summary KPIs ===

        domainGrid.appendChild(card);

      c.appendChild(domainGrid);

      // === Filters & Search ===
